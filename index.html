<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Gündem & Sohbet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Özelleştirilmiş Neon Kaydırma Çubuğu */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #8b5cf6; border-radius: 10px; }
        
        /* Arka plan neon parıltıları için ekstra animasyon */
        .neon-glow {
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15), 0 0 40px rgba(236, 72, 153, 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen relative overflow-x-hidden">
    
    <div class="absolute top-[-10%] left-[-20%] w-[80%] h-[50%] bg-violet-600/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[10%] right-[-20%] w-[80%] h-[50%] bg-rose-500/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-slate-900/40 backdrop-blur-xl shadow-2xl relative pb-16 border-x border-slate-800/60">
        
        <header class="p-4 border-b border-slate-800/80 flex justify-between items-center bg-slate-950/80 sticky top-0 z-20 backdrop-blur-md">
            <h1 id="page-title" class="text-xl font-black bg-gradient-to-r from-violet-400 via-fuchsia-400 to-cyan-400 bg-clip-text text-transparent tracking-wide">✨ Gündem</h1>
            <div id="user-area"></div>
        </header>

        <div id="login-screen" class="flex-1 flex flex-col items-center justify-center p-6 space-y-8 relative z-10">
            <div class="relative">
                <div class="absolute inset-0 bg-violet-500 rounded-full blur-3xl opacity-30 animate-pulse"></div>
                <div class="text-8xl relative filter drop-shadow-[0_0_15px_rgba(139,92,246,0.5)]">🌌</div>
            </div>
            <div class="space-y-3 text-center">
                <h2 class="text-3xl font-black tracking-tight bg-gradient-to-r from-violet-400 via-fuchsia-400 to-cyan-400 bg-clip-text text-transparent">Siber Evrene Hoş Geldin</h2>
                <p class="text-slate-400 text-sm px-6 leading-relaxed">Gündemi neon ışıklar altında yakala, toplulukla anlık konuş ve yapay zekayla sohbet et.</p>
            </div>
            <button id="btn-login" class="w-full max-w-xs py-4 px-6 bg-gradient-to-r from-violet-600 via-fuchsia-600 to-cyan-600 text-white rounded-2xl font-bold hover:opacity-90 transition-all transform hover:scale-[1.03] active:scale-[0.97] shadow-lg shadow-violet-500/30 flex items-center justify-center space-x-2">
                <span>Google ile Giriş Yap</span>
            </button>
        </div>

        <div id="app-screen" class="hidden flex-1 flex flex-col p-4 overflow-y-auto">
            
            <section id="tab-gundem" class="space-y-6">
                <div class="bg-white/5 p-4 rounded-3xl border border-slate-800/80 neon-glow">
                    <textarea id="input-gundem" placeholder="Gündeme dair ne paylaşmak istersin?" class="w-full bg-transparent border-none focus:outline-none resize-none text-slate-100 text-sm placeholder-slate-500 font-medium" rows="2"></textarea>
                    <div class="flex justify-end mt-2">
                        <button id="btn-paylas" class="px-6 py-2 bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white rounded-2xl text-xs font-bold hover:opacity-90 transition shadow-md shadow-violet-500/20">Paylaş</button>
                    </div>
                </div>
                <div class="space-y-4">
                    <h3 class="font-extrabold text-xs uppercase tracking-wider text-slate-500">Canlı Akış</h3>
                    <div id="gundem-listesi" class="space-y-3"></div>
                </div>
            </section>

            <section id="tab-chat" class="hidden flex flex-col h-[70vh]">
                <div id="chat-messages" class="flex-1 overflow-y-auto space-y-3 pr-1 mb-4 flex flex-col"></div>
                <div class="flex items-center space-x-2 bg-white/5 p-2 rounded-2xl border border-slate-800/80 backdrop-blur-md">
                    <input type="text" id="input-chat" placeholder="Bir mesaj yaz..." class="flex-1 bg-transparent border-none focus:outline-none px-4 text-sm text-slate-100 placeholder-slate-500" />
                    <button id="btn-send-chat" class="p-3 bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white rounded-xl hover:opacity-90 transition shadow-md">
                        <svg class="w-4 h-4 transform rotate-45" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
            </section>

            <section id="tab-unluler" class="hidden flex flex-col h-[70vh]">
                <div class="flex space-x-2 overflow-x-auto pb-3 mb-3 border-b border-slate-800/60">
                    <button class="celebrity-btn px-5 py-2 rounded-2xl text-xs font-bold transition-all duration-300" data-cel="elon" id="btn-celeb-elon">Elon Musk</button>
                    <button class="celebrity-btn px-5 py-2 rounded-2xl text-xs font-bold transition-all duration-300" data-cel="einstein" id="btn-celeb-einstein">Einstein</button>
                    <button class="celebrity-btn px-5 py-2 rounded-2xl text-xs font-bold transition-all duration-300" data-cel="shakespeare" id="btn-celeb-shakespeare">Shakespeare</button>
                </div>
                <div id="ai-messages" class="flex-1 overflow-y-auto space-y-3 pr-1 mb-4 flex flex-col"></div>
                <div class="flex items-center space-x-2 bg-white/5 p-2 rounded-2xl border border-slate-800/80 backdrop-blur-md">
                    <input type="text" id="input-ai" placeholder="Ünlüye sorunu sor..." class="flex-1 bg-transparent border-none focus:outline-none px-4 text-sm text-slate-100 placeholder-slate-500" />
                    <button id="btn-send-ai" class="p-3 bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white rounded-xl hover:opacity-90 transition shadow-md">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </button>
                </div>
            </section>

        </div>

        <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-950/90 border-t border-slate-900/80 flex justify-around items-center h-16 z-20 backdrop-blur-md">
            <button class="nav-item flex flex-col items-center space-y-1 text-violet-400 w-full py-2 transition" data-tab="gundem">
                <span class="text-xl filter drop-shadow-[0_0_8px_rgba(139,92,246,0.4)]">✨</span>
                <span class="text-[10px] font-bold">Gündem</span>
            </button>
            <button class="nav-item flex flex-col items-center space-y-1 text-slate-500 hover:text-violet-400 w-full py-2 transition" data-tab="chat">
                <span class="text-xl">💬</span>
                <span class="text-[10px] font-bold">Sohbet</span>
            </button>
            <button class="nav-item flex flex-col items-center space-y-1 text-slate-500 hover:text-violet-400 w-full py-2 transition" data-tab="unluler">
                <span class="text-xl">🎭</span>
                <span class="text-[10px] font-bold">Ünlüler</span>
            </button>
        </nav>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBp-FSOxxPBtvyOCLDXMz5G8OsdEhjx5uk",
            authDomain: "signub-c831e.firebaseapp.com",
            projectId: "signub-c831e",
            storageBucket: "signub-c831e.firebasestorage.app",
            messagingSenderId: "1062016988286",
            appId: "1:1062016988286:web:ae1f4543fb1b751b16142f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const btnLogin = document.getElementById("btn-login");
        const btnPaylas = document.getElementById("btn-paylas");
        const inputGundem = document.getElementById("input-gundem");
        const gundemListesi = document.getElementById("gundem-listesi");
        const userArea = document.getElementById("user-area");
        const appScreen = document.getElementById("app-screen");
        const bottomNav = document.getElementById("bottom-nav");

        // Sekme Değiştirme Sistemi
        const tabs = {
            gundem: { el: document.getElementById("tab-gundem"), title: "✨ Gündem" },
            chat: { el: document.getElementById("tab-chat"), title: "💬 Ortak Sohbet" },
            unluler: { el: document.getElementById("tab-unluler"), title: "🎭 Ünlüler AI" }
        };

        document.querySelectorAll(".nav-item").forEach(button => {
            button.addEventListener("click", () => {
                const targetTab = button.getAttribute("data-tab");
                
                // Aktif buton rengi
                document.querySelectorAll(".nav-item").forEach(btn => {
                    btn.classList.replace("text-violet-400", "text-slate-500");
                });
                button.classList.replace("text-slate-500", "text-violet-400");

                // Sekmeleri Aç/Kapa
                Object.keys(tabs).forEach(key => {
                    if (key === targetTab) {
                        tabs[key].el.classList.remove("hidden");
                        document.getElementById("page-title").textContent = tabs[key].title;
                        if(key === 'chat') {
                            const chatMessages = document.getElementById("chat-messages");
                            chatMessages.scrollTop = chatMessages.scrollHeight;
                        }
                    } else {
                        tabs[key].el.classList.add("hidden");
                    }
                });
            });
        });

        // KULLANICI KONTROLÜ
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById("login-screen").classList.add("hidden");
                appScreen.classList.remove("hidden");
                bottomNav.classList.remove("hidden");
                
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    displayName: user.displayName,
                    email: user.email,
                    photoURL: user.photoURL,
                    lastLogin: serverTimestamp()
                }, { merge: true });

                userArea.innerHTML = `
                    <div class="flex items-center space-x-2">
                        <img src="${user.photoURL}" class="w-8 h-8 rounded-full border-2 border-violet-500 shadow-lg" />
                        <button id="btn-logout" class="text-xs text-rose-400 font-bold hover:underline">Çıkış</button>
                    </div>
                `;
                document.getElementById("btn-logout").addEventListener("click", () => signOut(auth));
                
                gundemiDinle();
                chatDinle();
                selectCelebrity("elon");
            } else {
                document.getElementById("login-screen").classList.remove("hidden");
                appScreen.classList.add("hidden");
                bottomNav.classList.add("hidden");
                userArea.innerHTML = "";
            }
        });

        btnLogin.addEventListener("click", () => {
            signInWithPopup(auth, provider).catch(err => console.error(err));
        });

        // 1. GÜNDEM SİSTEMİ
        btnPaylas.addEventListener("click", async () => {
            const text = inputGundem.value.trim();
            if(!text) return;
            await addDoc(collection(db, "gundem"), {
                uid: auth.currentUser.uid,
                userName: auth.currentUser.displayName,
                userPhoto: auth.currentUser.photoURL,
                content: text,
                createdAt: serverTimestamp()
            });
            inputGundem.value = "";
        });

        function gundemiDinle() {
            const q = query(collection(db, "gundem"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                gundemListesi.innerHTML = "";
                snapshot.forEach(doc => {
                    const post = doc.data();
                    const el = document.createElement("div");
                    el.className = "p-4 bg-white/5 backdrop-blur-md rounded-2xl border border-slate-800/80 flex space-x-3 shadow-sm hover:border-slate-700/80 transition duration-300";
                    el.innerHTML = `
                        <img src="${post.userPhoto}" class="w-9 h-9 rounded-full border border-slate-700 shadow-sm" />
                        <div>
                            <h4 class="font-extrabold text-xs text-slate-200">${post.userName}</h4>
                            <p class="text-slate-300 text-sm mt-1 leading-relaxed font-medium">${post.content}</p>
                        </div>
                    `;
                    gundemListesi.appendChild(el);
                });
            });
        }

        // 2. CHAT SİSTEMİ
        const btnSendChat = document.getElementById("btn-send-chat");
        const inputChat = document.getElementById("input-chat");
        const chatMessages = document.getElementById("chat-messages");

        btnSendChat.addEventListener("click", async () => {
            const text = inputChat.value.trim();
            if(!text) return;
            await addDoc(collection(db, "chats"), {
                uid: auth.currentUser.uid,
                userName: auth.currentUser.displayName,
                userPhoto: auth.currentUser.photoURL,
                message: text,
                createdAt: serverTimestamp()
            });
            inputChat.value = "";
        });

        inputChat.addEventListener("keypress", (e) => {
            if(e.key === "Enter") btnSendChat.click();
        });

        function chatDinle() {
            const q = query(collection(db, "chats"), orderBy("createdAt", "asc"), limit(60));
            onSnapshot(q, (snapshot) => {
                chatMessages.innerHTML = "";
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const isMe = msg.uid === auth.currentUser.uid;
                    const el = document.createElement("div");
                    el.className = `flex ${isMe ? 'justify-end' : 'justify-start'} w-full`;
                    el.innerHTML = `
                        <div class="flex items-end space-x-2 ${isMe ? 'flex-row-reverse space-x-reverse' : ''} max-w-[85%]">
                            <img src="${msg.userPhoto || 'https://via.placeholder.com/30'}" class="w-7 h-7 rounded-full border border-slate-800 shadow-sm" />
                            <div class="p-3.5 rounded-2xl text-sm shadow-lg ${isMe ? 'bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white rounded-br-none' : 'bg-white/5 border border-slate-800/80 text-slate-100 rounded-bl-none'}">
                                <span class="block font-black text-[9px] uppercase tracking-wider opacity-80 mb-0.5 ${isMe ? 'text-violet-200' : 'text-fuchsia-400'}">${msg.userName}</span>
                                <p class="leading-snug font-medium">${msg.message}</p>
                            </div>
                        </div>
                    `;
                    chatMessages.appendChild(el);
                });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        // 3. GELİŞMİŞ "KARAKTER MOTORLU" ÜNLÜLER SİSTEMİ
        let activeCeleb = "elon";
        const celebDetails = {
            elon: { name: "Elon Musk", color: "from-blue-600/20 to-cyan-600/20", text: "text-blue-100", border: "border-blue-500/30", titleColor: "text-blue-400" },
            einstein: { name: "Albert Einstein", color: "from-amber-600/20 to-yellow-600/20", text: "text-amber-100", border: "border-amber-500/30", titleColor: "text-amber-400" },
            shakespeare: { name: "W. Shakespeare", color: "from-emerald-600/20 to-teal-600/20", text: "text-emerald-100", border: "border-emerald-500/30", titleColor: "text-emerald-400" }
        };

        const celebEngine = {
            elon: {
                welcome: "Mars için biletleri hazırladın mı dostum? Yoksa roket motorları hakkında mı konuşacağız? 🚀",
                keywords: {
                    "para": "Para sadece kaynak tahsisi için dijital bir veri tabanıdır. Önemli olan insanlığın geleceği!",
                    "mars": "Mars'a gitmek zorundayız çünkü çok gezegenli bir tür olmak bizi yok olmaktan kurtaracak tek şey.",
                    "yapay zeka": "Yapay zeka çok hızlı gelişiyor. Dikkatli olmazsak insanlık için tehlikeli olabilir.",
                    "tesla": "Elektrikli araçlar sadece başlangıçtı. Şimdi sırada otonom sürüş devrimi var."
                },
                fallback: [
                    "Bunu X uygulamasında tartışmalıyız! 😉",
                    "İlginç bir yaklaşım, ama daha fazla roket gücüne ihtiyacımız var.",
                    "Zaman değerlidir, bu yüzden doğrudan konuya gelelim."
                ]
            },
            einstein: {
                welcome: "Doğa kanunları üzerine felsefe yapmaya hazır mısın evlat? Zaman görelidir! 🧠",
                keywords: {
                    "zaman": "Zaman, sadece bir illüzyondan ibarettir. Geçmiş, şimdi ve gelecek aynı onda var olur.",
                    "fizik": "Fizik, Tanrı'nın evreni yaratırken kullandığı kuralları anlama çabasıdır.",
                    "formül": "E = mc² formülü kütle ile enerjinin aslında aynı şey olduğunu söyler.",
                    "zeka": "Zeki olmanın ölçüsü, gerektiğinde düşüncelerini değiştirebilme yeteneğidir."
                },
                fallback: [
                    "Hayal gücü bilgiden daha önemlidir, bunu sakın unutma.",
                    "Doğaya derinlemesine bak, o zaman her şeyi daha iyi anlayacaksın.",
                    "Önemli olan soru sormayı bırakmamaktır."
                ]
            },
            shakespeare: {
                welcome: "Kelimelerin büyülü dünyasına hoş geldin şair ruhlu dostum. 🎭",
                keywords: {
                    "aşk": "Aşk gözle değil, ruhla görülür; bu yüzden kanatlı aşk tanrısı Cupid hep kör tasvir edilir.",
                    "hayat": "Dünya bir sahnedir, bizlerse sadece birer oyuncuyuz.",
                    "ölüm": "Olmak ya da olmamak! İşte bütün mesele bu.",
                    "kelime": "Kelimeler rüzgâra benzer, onları hissetmek gerek."
                },
                fallback: [
                    "Hüzünlü bir gecenin ardından her zaman parlak bir gün doğar.",
                    "Kalbinin sesini dinle, o sana en doğru piyesi fısıldayacaktır.",
                    "Altın olan her şey parlamaz."
                ]
            }
        };

        function selectCelebrity(celebKey) {
            activeCeleb = celebKey;
            
            document.querySelectorAll(".celebrity-btn").forEach(btn => {
                const isTarget = btn.getAttribute("data-cel") === celebKey;
                const activeClasses = "bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white shadow-lg shadow-violet-500/20 scale-105 border-transparent";
                const inactiveClasses = "bg-white/5 text-slate-400 border border-slate-800/80 hover:bg-white/10 hover:text-slate-200";
                
                if (isTarget) {
                    btn.className = `celebrity-btn px-5 py-2 rounded-2xl text-xs font-bold transition-all duration-300 ${activeClasses}`;
                } else {
                    btn.className = `celebrity-btn px-5 py-2 rounded-2xl text-xs font-bold transition-all duration-300 ${inactiveClasses}`;
                }
            });

            const details = celebDetails[celebKey];
            const engine = celebEngine[celebKey];
            document.getElementById("ai-messages").innerHTML = `
                <div class="bg-gradient-to-br ${details.color} ${details.border} border p-4 rounded-2xl text-sm ${details.text} max-w-[85%] rounded-bl-none shadow-lg backdrop-blur-md">
                    <strong class="block text-[9px] uppercase tracking-wider mb-1.5 font-black ${details.titleColor}">${details.name}</strong>
                    <p class="leading-relaxed font-semibold">${engine.welcome}</p>
                </div>
            `;
        }

        document.querySelectorAll(".celebrity-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                selectCelebrity(btn.getAttribute("data-cel"));
            });
        });

        const btnSendAi = document.getElementById("btn-send-ai");
        const inputAi = document.getElementById("input-ai");
        const aiMessages = document.getElementById("ai-messages");

        btnSendAi.addEventListener("click", () => {
            const userText = inputAi.value.trim();
            if(!userText) return;

            const userMsg = document.createElement("div");
            userMsg.className = "flex justify-end w-full";
            userMsg.innerHTML = `
                <div class="p-3.5 bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white rounded-2xl text-sm max-w-[85%] rounded-br-none shadow-lg font-semibold">
                    ${userText}
                </div>
            `;
            aiMessages.appendChild(userMsg);
            inputAi.value = "";
            aiMessages.scrollTop = aiMessages.scrollHeight;

            setTimeout(() => {
                const engine = celebEngine[activeCeleb];
                const details = celebDetails[activeCeleb];
                let reply = "";

                const lowerText = userText.toLowerCase();
                let foundKeyword = false;

                for (const key in engine.keywords) {
                    if (lowerText.includes(key)) {
                        reply = engine.keywords[key];
                        foundKeyword = true;
                        break;
                    }
                }

                if (!foundKeyword) {
                    reply = engine.fallback[Math.floor(Math.random() * engine.fallback.length)];
                }

                const aiMsg = document.createElement("div");
                aiMsg.className = "flex justify-start w-full";
                aiMsg.innerHTML = `
                    <div class="bg-gradient-to-br ${details.color} ${details.border} border p-4 rounded-2xl text-sm ${details.text} max-w-[85%] rounded-bl-none shadow-lg backdrop-blur-md">
                        <strong class="block text-[9px] uppercase tracking-wider mb-1.5 font-black ${details.titleColor}">${details.name}</strong>
                        <p class="leading-relaxed font-semibold">${reply}</p>
                    </div>
                `;
                aiMessages.appendChild(aiMsg);
                aiMessages.scrollTop = aiMessages.scrollHeight;
            }, 800);
        });

        inputAi.addEventListener("keypress", (e) => {
            if(e.key === "Enter") btnSendAi.click();
        });
    </script>
</body>
</html>
