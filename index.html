<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA ULTRA X - Quantum Production Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #03050a;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(10, 15, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #03050a;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 99px;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col selection:bg-fuchsia-500/30">

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-2 pointer-events-none animate-bounce"></div>

    <header class="glass-card sticky top-0 z-40 border-b border-slate-800/80 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-violet-600 via-fuchsia-600 to-cyan-500 flex items-center justify-center font-black text-white shadow-lg">
                X
            </div>
            <div>
                <h1 class="text-lg font-extrabold tracking-tight bg-gradient-to-r from-violet-400 via-fuchsia-400 to-cyan-400 bg-clip-text text-transparent">AURA ULTRA X</h1>
                <span class="text-[9px] uppercase tracking-widest text-slate-500 font-bold block">Quantum Live Network</span>
            </div>
        </div>
        
        <div id="user-display" class="hidden flex items-center space-x-4">
            <div class="flex items-center space-x-3">
                <img id="user-avatar" src="" class="w-8 h-8 rounded-full border-2 border-cyan-500 shadow-md">
                <div class="flex flex-col">
                    <span id="user-name-tag" class="text-xs font-bold text-slate-200"></span>
                    <span class="text-[8px] text-emerald-400 font-semibold flex items-center">● Canlı Bağlantı</span>
                </div>
                <button onclick="logout()" class="text-xs text-rose-500 hover:text-rose-400 font-black transition pl-2">Çıkış</button>
            </div>
        </div>
    </header>

    <div class="flex-1 max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 p-4 lg:p-6">
        
        <aside class="lg:col-span-3 space-y-4">
            <div class="glass-card rounded-2xl p-4 space-y-3 border border-cyan-500/10">
                <h3 class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">🔍 KOZMİK ARAMA</h3>
                <input type="text" id="search-input" oninput="searchNetwork()" placeholder="Kullanıcı veya kelime ara..." class="w-full bg-slate-950 border border-slate-800 focus:border-cyan-500 rounded-xl px-3 py-2 text-xs text-slate-100 placeholder-slate-500 focus:outline-none transition">
            </div>

            <div class="glass-card rounded-2xl p-4 space-y-2">
                <button onclick="switchTab('feed')" id="btn-tab-feed" class="w-full text-left px-4 py-3 rounded-xl text-xs font-bold transition flex items-center space-x-3 bg-gradient-to-r from-violet-600/10 to-fuchsia-600/10 text-violet-400 border border-violet-500/20">
                    <span>🪐</span> <span>Kozmik Akış (Feed)</span>
                </button>
                <button onclick="switchTab('chat')" id="btn-tab-chat" class="w-full text-left px-4 py-3 rounded-xl text-xs font-bold transition flex items-center space-x-3 text-slate-400 hover:bg-slate-900">
                    <span>💬</span> <span>Canlı Kolektif Sohbet</span>
                </button>
                <button onclick="switchTab('canvas')" id="btn-tab-canvas" class="w-full text-left px-4 py-3 rounded-xl text-xs font-bold transition flex items-center space-x-3 text-slate-400 hover:bg-slate-900">
                    <span>🎨</span> <span>Gerçek Resim Tuvali</span>
                </button>
            </div>
        </aside>

        <main class="lg:col-span-6 space-y-6">

            <div id="login-section" class="glass-card rounded-3xl p-8 text-center space-y-6 py-20 relative overflow-hidden">
                <div class="absolute -top-20 -left-20 w-40 h-40 bg-violet-600/10 rounded-full blur-3xl"></div>
                <div class="w-24 h-24 mx-auto rounded-2xl bg-gradient-to-br from-violet-600 to-cyan-500 p-[1px] shadow-2xl">
                    <div class="w-full h-full bg-[#03050a] rounded-2xl flex items-center justify-center text-4xl">🌌</div>
                </div>
                <h2 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-violet-400 via-fuchsia-400 to-cyan-400">Aura Giriş Protokolü</h2>
                <p class="text-slate-400 text-xs max-w-sm mx-auto leading-relaxed">Güvenli ve gerçek zamanlı katılım için Google hesabınla anında giriş yap.</p>
                <div class="space-y-3 max-w-xs mx-auto pt-4">
                    <button onclick="googleLogin()" class="w-full py-3 bg-gradient-to-r from-violet-600 via-fuchsia-600 to-cyan-500 rounded-xl font-bold text-xs text-white shadow-lg hover:opacity-95 transition">Google ile Güvenli Bağlan 🚀</button>
                </div>
            </div>

            <div id="app-section" class="hidden space-y-6">
                
                <div id="view-feed" class="space-y-6">
                    <div class="glass-card rounded-2xl p-4 space-y-3">
                        <textarea id="post-input" placeholder="Tüm sisteme bir fısıltı gönder..." class="w-full bg-slate-950 border border-slate-850 rounded-xl p-3 text-xs text-slate-100 focus:outline-none resize-none" rows="3"></textarea>
                        <div class="flex justify-end">
                            <button onclick="createPost()" class="px-5 py-2 bg-gradient-to-r from-violet-600 to-cyan-500 rounded-xl text-xs font-bold text-white shadow">Payload Gönder 🚀</button>
                        </div>
                    </div>
                    <div id="feed-container" class="space-y-4"></div>
                </div>

                <div id="view-chat" class="hidden glass-card rounded-2xl flex flex-col h-[60vh] border border-slate-800/60 overflow-hidden">
                    <div class="p-3 bg-slate-950 border-b border-slate-800 flex justify-between items-center">
                        <span class="text-xs font-bold text-cyan-400">● GERÇEK ZAMANLI LOBİ</span>
                        <span class="text-[9px] bg-cyan-950 text-cyan-300 px-2 py-0.5 rounded font-black">CANLI</span>
                    </div>
                    <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-950/20"></div>
                    <form onsubmit="sendChat(event)" class="p-3 border-t border-slate-800 bg-slate-950/60 flex space-x-2">
                        <input type="text" id="chat-input" placeholder="Anlık mesaj yazın..." class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-xs text-slate-100 focus:outline-none">
                        <button type="submit" class="px-5 py-2.5 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl text-xs font-bold text-white">Gönder</button>
                    </form>
                </div>

                <div id="view-canvas" class="hidden space-y-6">
                    <div class="glass-card rounded-2xl p-5 space-y-5 border border-cyan-500/10">
                        <div class="flex justify-between items-center">
                            <h2 class="text-sm font-extrabold text-cyan-400">🎨 Gerçek Zamanlı PNG Tuval</h2>
                            <button onclick="clearBoard()" class="text-[10px] bg-slate-900 border border-slate-800 px-2.5 py-1.5 rounded-lg text-slate-400">Temizle 🧹</button>
                        </div>
                        
                        <div class="flex flex-wrap gap-2 justify-center py-2 bg-slate-950 p-2 rounded-xl">
                            <button onclick="setCurrentColor('#ef4444')" class="w-6 h-6 rounded bg-red-500 border border-white"></button>
                            <button onclick="setCurrentColor('#f97316')" class="w-6 h-6 rounded bg-orange-500"></button>
                            <button onclick="setCurrentColor('#22c55e')" class="w-6 h-6 rounded bg-green-500"></button>
                            <button onclick="setCurrentColor('#06b6d4')" class="w-6 h-6 rounded bg-cyan-500"></button>
                            <button onclick="setCurrentColor('#a855f7')" class="w-6 h-6 rounded bg-purple-500"></button>
                            <button onclick="setCurrentColor('#ffffff')" class="w-6 h-6 rounded bg-white"></button>
                            <button onclick="setCurrentColor('#03050a')" class="px-2 bg-slate-800 rounded text-[10px] font-bold">🧼 Silgi</button>
                        </div>

                        <div class="max-w-[320px] mx-auto bg-[#03050a] p-1 rounded-xl border border-slate-800">
                            <canvas id="real-canvas" width="256" height="256" class="w-full aspect-square cursor-crosshair rounded"></canvas>
                        </div>

                        <button onclick="shareCanvasAsImage()" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-violet-600 text-xs font-bold rounded-xl text-white shadow">Görsel Olarak Akışta Paylaş! 🌍</button>
                    </div>
                </div>

            </div>
        </main>

        <aside class="lg:col-span-3 space-y-6">
            <div class="glass-card rounded-2xl p-4 space-y-4 border border-cyan-500/10">
                <h3 class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">📊 KÜRESEL ANKETLER</h3>
                <div class="space-y-4" id="polls-list-wrapper"></div>
                
                <div class="bg-slate-950/60 p-3 rounded-xl border border-slate-900 space-y-2">
                    <span class="text-[10px] text-slate-400 font-bold block">Yeni Anket Oluştur:</span>
                    <input type="text" id="new-poll-title" placeholder="Anket Sorusu?" class="w-full bg-slate-900 border p-2 rounded text-[10px] text-slate-100 focus:outline-none">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="new-poll-opt1" placeholder="Seçenek A" class="w-full bg-slate-900 border p-2 rounded text-[10px] text-slate-100 focus:outline-none">
                        <input type="text" id="new-poll-opt2" placeholder="Seçenek B" class="w-full bg-slate-900 border p-2 rounded text-[10px] text-slate-100 focus:outline-none">
                    </div>
                    <button onclick="addNewPoll()" class="w-full py-1.5 bg-cyan-600 rounded text-[9px] font-black text-white">ANKETİ BAŞLAT</button>
                </div>
            </div>
        </aside>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Ayarları (Uluslararası Açık Sandbox)
        const firebaseConfig = {
            apiKey: "AIzaSyBp-FSOxxPBtvyOCLDXMz5G8OsdEhjx5uk",
            authDomain: "signub-c831e.firebaseapp.com",
            projectId: "signub-c831e",
            storageBucket: "signub-c831e.firebasestorage.app",
            messagingSenderId: "1062016988286",
            appId: "1:1062016988286:web:ae1f4543fb1b751b16142f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let selectedColor = "#ef4444";

        // HTML5 Canvas Tanımları
        const canvas = document.getElementById("real-canvas");
        const ctx = canvas.getContext("2d");
        const pixelSize = 16; // 16x16 Grid = 256 piksel

        // Tuvali Siyah Arka Planla Hazırla
        function initCanvas() {
            ctx.fillStyle = "#03050a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        initCanvas();

        // Canvas Boyama Olayı
        canvas.addEventListener("click", (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Tıklanan konumu grid koordinatına çevir
            const gridX = Math.floor(x / (rect.width / 16)) * pixelSize;
            const gridY = Math.floor(y / (rect.height / 16)) * pixelSize;

            ctx.fillStyle = selectedColor;
            ctx.fillRect(gridX, gridY, pixelSize, pixelSize);
        });

        window.setCurrentColor = function(color) {
            selectedColor = color;
        };

        window.clearBoard = function() {
            initCanvas();
        };

        // GÖRSELLEŞTİRME VE AKIŞTA YAYINLAMA MOTORU (PNG EXPORT)
        window.shareCanvasAsImage = async function() {
            try {
                // Canvas'taki resmi base64 formatında alıyoruz (Böylece gerçek bir görsel oluyor!)
                const imageUrl = canvas.toDataURL("image/png");

                await addDoc(collection(db, "aura_ultra_posts"), {
                    uid: currentUser.uid,
                    userName: currentUser.displayName,
                    userPhoto: currentUser.photoURL,
                    content: "🎨 Tuvalimde yepyeni bir sanat eseri tasarladım!",
                    sharedImage: imageUrl,
                    createdAt: serverTimestamp()
                });

                window.showToast("Sanat eserin akışta canlı olarak yayınlandı!", "success");
                window.switchTab('feed');
            } catch (err) {
                window.showToast("Görsel paylaşımında hata oluştu.", "error");
            }
        };

        // TOAST PANELİ
        window.showToast = function(message, type = "info") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = `p-3 rounded-xl text-xs font-bold border transition duration-300 ${
                type === "success" ? "bg-emerald-950/90 border-emerald-500/20 text-emerald-300" : "bg-slate-900 border-slate-800 text-cyan-300"
            }`;
            toast.textContent = "⚡ " + message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        };

        // GOOGLE GİRİŞ SİSTEMİ
        window.googleLogin = function() {
            signInWithPopup(auth, provider)
                .then((result) => {
                    currentUser = result.user;
                    window.showToast("Başarıyla oturum açıldı!", "success");
                })
                .catch((error) => {
                    window.showToast("Google Girişi Başarısız: " + error.message, "error");
                });
        };

        window.logout = function() {
            signOut(auth).then(() => {
                currentUser = null;
                document.getElementById("login-section").classList.remove("hidden");
                document.getElementById("app-section").classList.add("hidden");
                document.getElementById("user-display").classList.add("hidden");
            });
        };

        // OTURUM DURUM TAKİBİ
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById("login-section").classList.add("hidden");
                document.getElementById("app-section").classList.remove("hidden");
                document.getElementById("user-display").classList.remove("hidden");
                
                document.getElementById("user-avatar").src = user.photoURL || "https://i.pravatar.cc/100";
                document.getElementById("user-name-tag").textContent = user.displayName;
                
                // Canlı Veri Akışları Başlasın!
                listenFeed();
                listenChat();
                listenPolls();
            }
        });

        // SEKME YÖNETİMİ
        window.switchTab = function(tab) {
            ["feed", "chat", "canvas"].forEach(t => {
                document.getElementById(`view-${t}`).classList.add("hidden");
                document.getElementById(`btn-tab-${t}`).className = "w-full text-left px-4 py-3 rounded-xl text-xs font-bold text-slate-400 hover:bg-slate-900 transition";
            });
            document.getElementById(`view-${tab}`).classList.remove("hidden");
            document.getElementById(`btn-tab-${tab}`).className = "w-full text-left px-4 py-3 rounded-xl text-xs font-bold transition bg-gradient-to-r from-violet-600/10 to-fuchsia-600/10 text-violet-400 border border-violet-500/20";
        };

        // CANLI FEED (GÖNDERİ PAYLAŞMA VE LİSTELEME)
        window.createPost = async function() {
            const val = document.getElementById("post-input").value.trim();
            if(!val) return;

            await addDoc(collection(db, "aura_ultra_posts"), {
                uid: currentUser.uid,
                userName: currentUser.displayName,
                userPhoto: currentUser.photoURL,
                content: val,
                createdAt: serverTimestamp()
            });
            document.getElementById("post-input").value = "";
            window.showToast("Gönderiniz uzaya fırlatıldı!");
        };

        function listenFeed() {
            const q = query(collection(db, "aura_ultra_posts"), orderBy("createdAt", "desc"), limit(25));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById("feed-container");
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const p = doc.data();
                    const el = document.createElement("div");
                    el.className = "glass-card rounded-2xl p-4 space-y-3.5 border border-slate-800 hover:border-slate-700/50 transition";
                    
                    // Görsel eki varsa göster
                    let imgHtml = "";
                    if (p.sharedImage) {
                        imgHtml = `<img src="${p.sharedImage}" class="max-w-[200px] w-full rounded-xl border border-slate-800 shadow-inner mt-2">`;
                    }

                    el.innerHTML = `
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-3">
                                <img src="${p.userPhoto || 'https://i.pravatar.cc/100'}" class="w-8 h-8 rounded-full border border-slate-800">
                                <div>
                                    <span class="font-bold text-xs text-slate-200 block">${p.userName}</span>
                                    <span class="text-[8px] text-violet-400 font-extrabold uppercase tracking-widest block">Aura Node</span>
                                </div>
                            </div>
                        </div>
                        <p class="text-xs text-slate-300 leading-relaxed break-words">${p.content}</p>
                        ${imgHtml}
                    `;
                    container.appendChild(el);
                });
            });
        }

        // CANLI SOHBET MOTORU (REAL-TIME CHAT)
        window.sendChat = async function(e) {
            e.preventDefault();
            const input = document.getElementById("chat-input");
            const val = input.value.trim();
            if(!val) return;

            await addDoc(collection(db, "aura_ultra_chats"), {
                uid: currentUser.uid,
                userName: currentUser.displayName,
                userPhoto: currentUser.photoURL,
                message: val,
                createdAt: serverTimestamp()
            });
            input.value = "";
        };

        function listenChat() {
            const q = query(collection(db, "aura_ultra_chats"), orderBy("createdAt", "asc"), limit(40));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById("chat-container");
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const isMe = msg.uid === currentUser.uid;
                    const el = document.createElement("div");
                    el.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
                    el.innerHTML = `
                        <div class="max-w-[80%] p-2.5 rounded-xl text-xs ${isMe ? 'bg-gradient-to-r from-cyan-500 to-blue-600 text-white' : 'bg-slate-900 border border-slate-800 text-slate-100'}">
                            <span class="font-bold text-[8px] block text-slate-400 mb-0.5">${msg.userName}</span>
                            <p class="break-all font-medium">${msg.message}</p>
                        </div>
                    `;
                    container.appendChild(el);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        // ARAMA MOTORU
        window.searchNetwork = function() {
            const queryVal = document.getElementById("search-input").value.toLowerCase().trim();
            const container = document.getElementById("feed-container");
            
            if (queryVal === "") {
                listenFeed();
                return;
            }

            // Client side filtreleme
            const cards = container.children;
            for (let card of cards) {
                const txt = card.innerText.toLowerCase();
                if (txt.includes(queryVal)) {
                    card.classList.remove("hidden");
                } else {
                    card.classList.add("hidden");
                }
            }
        };

        // KÜRESEL ANKETLER
        window.addNewPoll = async function() {
            const q = document.getElementById("new-poll-title").value.trim();
            const o1 = document.getElementById("new-poll-opt1").value.trim();
            const o2 = document.getElementById("new-poll-opt2").value.trim();
            if(!q || !o1 || !o2) return;

            await addDoc(collection(db, "aura_ultra_polls"), {
                question: q,
                option1: o1,
                option2: o2,
                votes1: 0,
                votes2: 0,
                createdAt: serverTimestamp()
            });

            document.getElementById("new-poll-title").value = "";
            document.getElementById("new-poll-opt1").value = "";
            document.getElementById("new-poll-opt2").value = "";
            window.showToast("Anket yayında!");
        };

        window.votePollDynamic = async function(id, optionIndex) {
            const pollRef = doc(db, "aura_ultra_polls", id);
            if (optionIndex === 1) {
                await updateDoc(pollRef, { votes1: increment(1) });
            } else {
                await updateDoc(pollRef, { votes2: increment(1) });
            }
            window.showToast("Oyunuz kaydedildi.");
        };

        function listenPolls() {
            const q = query(collection(db, "aura_ultra_polls"), orderBy("createdAt", "desc"), limit(3));
            onSnapshot(q, (snapshot) => {
                const wrapper = document.getElementById("polls-list-wrapper");
                wrapper.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const poll = docSnap.data();
                    const pollId = docSnap.id;
                    const t1 = poll.votes1 || 0;
                    const t2 = poll.votes2 || 0;
                    const total = t1 + t2 || 1;
                    const pct1 = Math.round((t1/total)*100);
                    const pct2 = Math.round((t2/total)*100);

                    const el = document.createElement("div");
                    el.className = "bg-slate-950/60 p-3 rounded-xl border border-slate-900 space-y-2";
                    el.innerHTML = `
                        <span class="text-[11px] font-bold text-slate-200 block">${poll.question}</span>
                        <div class="space-y-2">
                            <button onclick="votePollDynamic('${pollId}', 1)" class="w-full text-left relative overflow-hidden p-2 rounded bg-slate-900 text-[10px] flex justify-between items-center z-10">
                                <div class="absolute top-0 left-0 bottom-0 bg-violet-600/15" style="width: ${pct1}%"></div>
                                <span class="relative z-20">${poll.option1}</span>
                                <span class="relative z-20 text-violet-400 font-bold">${pct1}% (${t1})</span>
                            </button>
                            <button onclick="votePollDynamic('${pollId}', 2)" class="w-full text-left relative overflow-hidden p-2 rounded bg-slate-900 text-[10px] flex justify-between items-center z-10">
                                <div class="absolute top-0 left-0 bottom-0 bg-cyan-600/15" style="width: ${pct2}%"></div>
                                <span class="relative z-20">${poll.option2}</span>
                                <span class="relative z-20 text-cyan-400 font-bold">${pct2}% (${t2})</span>
                            </button>
                        </div>
                    `;
                    wrapper.appendChild(el);
                });
            });
        }
    </script>
</body>
</html>
