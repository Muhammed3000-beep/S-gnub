<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA ULTRA X - Search & Connect Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #03050a;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(10, 15, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
        }
        .pixel-grid {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            gap: 1px;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #03050a;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 99px;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col selection:bg-fuchsia-500/30">

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-2 pointer-events-none"></div>

    <header class="glass-card sticky top-0 z-40 border-b border-slate-800/80 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-violet-600 via-fuchsia-600 to-cyan-500 flex items-center justify-center font-black text-white shadow-lg animate-pulse">
                X
            </div>
            <div>
                <h1 class="text-lg font-extrabold tracking-tight bg-gradient-to-r from-violet-400 via-fuchsia-400 to-cyan-400 bg-clip-text text-transparent">AURA ULTRA X</h1>
                <span class="text-[9px] uppercase tracking-widest text-slate-500 font-bold block">Search & Connect Station</span>
            </div>
        </div>
        
        <div id="user-display" class="hidden flex items-center space-x-4">
            <div class="hidden md:flex items-center space-x-2 bg-slate-950/80 px-3 py-1.5 rounded-xl border border-slate-800">
                <span class="text-[9px] text-slate-500 font-black uppercase tracking-wider">AURA FREKANSI:</span>
                <select id="user-mood-select" onchange="updateMood()" class="bg-transparent text-xs text-cyan-400 font-bold outline-none cursor-pointer">
                    <option class="bg-slate-950" value="👾 Kaotik">👾 Kaotik</option>
                    <option class="bg-slate-950" value="🚀 Vizyoner">🚀 Vizyoner</option>
                    <option class="bg-slate-950" value="🧬 Siber">🧬 Siber</option>
                </select>
            </div>
            <div class="flex items-center space-x-3">
                <span id="user-name-tag" class="text-xs font-bold text-slate-200"></span>
                <button onclick="logout()" class="text-xs text-rose-500 hover:text-rose-400 font-black transition">Çıkış</button>
            </div>
        </div>
    </header>

    <div class="flex-1 max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 p-4 lg:p-6">
        
        <aside class="lg:col-span-3 space-y-4">
            
            <div class="glass-card rounded-2xl p-4 space-y-3 border border-cyan-500/10">
                <h3 class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">🔍 KOZMİK ARAMA</h3>
                <div class="relative">
                    <input type="text" id="search-user-input" oninput="searchUser()" placeholder="Kullanıcı adı veya kelime ara..." class="w-full bg-slate-950 border border-slate-800 focus:border-cyan-500 rounded-xl px-3 py-2 text-xs text-slate-100 placeholder-slate-500 focus:outline-none transition">
                </div>
                <div id="search-status-text" class="text-[10px] text-slate-500 italic hidden">Sonuçlar aşağıda listeleniyor...</div>
            </div>

            <div class="glass-card rounded-2xl p-4 space-y-2">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest px-2 mb-3">İSTASYONLAR</h3>
                <button onclick="switchTab('feed')" id="btn-tab-feed" class="w-full text-left px-4 py-3 rounded-xl text-xs font-bold transition flex items-center space-x-3 bg-gradient-to-r from-violet-600/10 to-fuchsia-600/10 text-violet-400 border border-violet-500/20">
                    <span>🪐</span> <span>Global Akış</span>
                </button>
                <button onclick="switchTab('whisper')" id="btn-tab-whisper" class="w-full text-left px-4 py-3 rounded-xl text-xs font-bold transition flex items-center space-x-3 text-slate-400 hover:bg-slate-900">
                    <span>🤫</span> <span>Karanlık Fısıltılar</span>
                </button>
                <button onclick="switchTab('chat')" id="btn-tab-chat" class="w-full text-left px-4 py-3 rounded-xl text-xs font-bold transition flex items-center space-x-3 text-slate-400 hover:bg-slate-900">
                    <span>💬</span> <span>Kolektif Bilinç (Chat)</span>
                </button>
                <button onclick="switchTab('playground')" id="btn-tab-playground" class="w-full text-left px-4 py-3 rounded-xl text-xs font-bold transition flex items-center space-x-3 text-slate-400 hover:bg-slate-900">
                    <span>🎨</span> <span>Dev Piksel Sanat Tuvali</span>
                </button>
            </div>

            <div class="glass-card rounded-2xl p-4 space-y-3 border border-fuchsia-500/10">
                <h3 class="text-[10px] font-black text-fuchsia-400 uppercase tracking-widest">🎲 KOLEKTİF İLHAM</h3>
                <div id="idea-box" class="bg-slate-950 p-3.5 rounded-xl border border-slate-900 text-xs text-cyan-300 min-h-[60px] flex items-center justify-center text-center font-medium italic">
                    "Yeni bir fikir enjekte etmek için tıkla."
                </div>
                <button onclick="spinIdea()" class="w-full py-2.5 bg-gradient-to-r from-violet-600 via-fuchsia-600 to-cyan-500 rounded-xl text-[10px] font-black tracking-wider uppercase transition text-white">FİKİR ÜRET ⚡</button>
            </div>
        </aside>

        <main class="lg:col-span-6 space-y-6">

            <div id="login-section" class="glass-card rounded-3xl p-8 text-center space-y-6 py-20">
                <div class="w-24 h-24 mx-auto rounded-2xl bg-gradient-to-br from-violet-600 to-cyan-500 p-[1px]">
                    <div class="w-full h-full bg-[#03050a] rounded-2xl flex items-center justify-center text-4xl">
                        🌌
                    </div>
                </div>
                <h2 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-violet-400 via-fuchsia-400 to-cyan-400">Yörüngeye Giriyorsun</h2>
                <div class="max-w-xs mx-auto pt-4">
                    <button onclick="guestLogin()" class="w-full py-3 bg-gradient-to-r from-violet-600 to-cyan-500 rounded-xl font-bold text-xs text-white shadow-lg">Ziyaretçi Girişiyle Anında Başlat 🚀</button>
                </div>
            </div>

            <div id="app-section" class="hidden space-y-6">
                
                <div id="view-feed" class="space-y-6">
                    <div class="glass-card rounded-2xl p-4 space-y-3">
                        <textarea id="post-input" placeholder="Tüm gezegene bir mesaj fırlat..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-slate-100 focus:outline-none resize-none" rows="3"></textarea>
                        <div class="flex justify-end">
                            <button onclick="createPost()" class="px-5 py-2 bg-violet-600 rounded-xl text-xs font-bold text-white">Payload Fırlat 🚀</button>
                        </div>
                    </div>
                    <div id="search-filter-alert" class="hidden bg-cyan-950/40 border border-cyan-500/20 p-3 rounded-xl flex justify-between items-center">
                        <span class="text-xs text-cyan-300">Arama filtresi şu an aktif.</span>
                        <button onclick="clearSearchFilter()" class="text-[10px] text-slate-400 hover:text-white font-bold">Filtreyi Kaldır ✕</button>
                    </div>
                    <div id="feed-container" class="space-y-4"></div>
                </div>

                <div id="view-whisper" class="hidden space-y-6">
                    <div class="glass-card rounded-2xl p-4 space-y-3">
                        <textarea id="whisper-input" placeholder="Kimseye söyleyemediğin o fısıltı..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-slate-100 focus:outline-none resize-none" rows="3"></textarea>
                        <div class="flex justify-end">
                            <button onclick="createWhisper()" class="px-6 py-2 bg-pink-600 rounded-xl text-xs font-bold text-white">Fısılda 🤫</button>
                        </div>
                    </div>
                    <div id="whisper-container" class="space-y-4"></div>
                </div>

                <div id="view-chat" class="hidden glass-card rounded-2xl flex flex-col h-[55vh] overflow-hidden">
                    <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
                    <form onsubmit="sendChat(event)" class="p-3 border-t border-slate-800 flex space-x-2">
                        <input type="text" id="chat-input" placeholder="Hızlıca bir mesaj bırakın..." class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-xs text-slate-100 focus:outline-none">
                        <button type="submit" class="px-5 py-2.5 bg-cyan-600 rounded-xl text-xs font-bold text-white">Gönder</button>
                    </form>
                </div>

                <div id="view-playground" class="hidden space-y-6">
                    <div class="glass-card rounded-2xl p-5 space-y-5">
                        <div class="flex justify-between items-center">
                            <h2 class="text-sm font-extrabold text-cyan-400">🎨 16x16 Mega Canvas</h2>
                            <button onclick="clearBoard()" class="text-[10px] bg-slate-900 border border-slate-800 px-2.5 py-1.5 rounded-lg text-slate-400">Temizle 🧹</button>
                        </div>
                        
                        <div class="flex flex-wrap gap-2 justify-center py-2 bg-slate-950 p-2 rounded-xl">
                            <button onclick="setCurrentColor('#ef4444')" class="w-6 h-6 rounded bg-red-500"></button>
                            <button onclick="setCurrentColor('#22c55e')" class="w-6 h-6 rounded bg-green-500"></button>
                            <button onclick="setCurrentColor('#06b6d4')" class="w-6 h-6 rounded bg-cyan-500"></button>
                            <button onclick="setCurrentColor('#a855f7')" class="w-6 h-6 rounded bg-purple-500"></button>
                            <button onclick="setCurrentColor('#ffffff')" class="w-6 h-6 rounded bg-white"></button>
                            <button onclick="setCurrentColor('#0f172a')" class="px-2 bg-slate-800 rounded text-[10px] font-bold">🧼 Silgi</button>
                        </div>

                        <div class="max-w-[280px] mx-auto bg-slate-950 p-2 rounded-2xl border border-slate-800">
                            <div class="pixel-grid aspect-square" id="pixel-board-target"></div>
                        </div>

                        <button onclick="sharePixelArt()" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-violet-600 text-xs font-bold rounded-xl text-white">Sanatımı Global Akışta Paylaş! 🌍</button>
                    </div>
                </div>

            </div>
        </main>

        <aside class="lg:col-span-3 space-y-6">
            <div class="glass-card rounded-2xl p-4 space-y-4">
                <h3 class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">📊 KÜRESEL ANKETLER</h3>
                <div class="space-y-4" id="polls-list-wrapper"></div>
                
                <div class="bg-slate-950/60 p-3 rounded-xl border border-slate-900 space-y-2">
                    <span class="text-[10px] text-slate-400 font-bold block">Yeni Anket Aç:</span>
                    <input type="text" id="new-poll-title" placeholder="Anket Sorusu?" class="w-full bg-slate-900 border p-2 rounded text-[10px] text-slate-100 focus:outline-none">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="new-poll-opt1" placeholder="Seçenek A" class="w-full bg-slate-900 border p-2 rounded text-[10px] text-slate-100 focus:outline-none">
                        <input type="text" id="new-poll-opt2" placeholder="Seçenek B" class="w-full bg-slate-900 border p-2 rounded text-[10px] text-slate-100 focus:outline-none">
                    </div>
                    <button onclick="addNewPoll()" class="w-full py-1.5 bg-cyan-600 rounded text-[9px] font-black text-white">ANKETİ YAYINLA 🚀</button>
                </div>
            </div>
        </aside>

    </div>

    <script>
        let currentUser = null;
        let selectedColor = "#a855f7";
        let pixelBoardState = Array(256).fill("#0f172a");

        // Örnek Simülasyon Verileri
        let mockPosts = [
            { userName: "Siber_Gezgin", content: "Aura dünyasına ilk adımı attım! Burası çok akıcı duruyor.", mood: "🧬 Siber" },
            { userName: "Kozmik_Ruh", content: "Bugün gökyüzü her zamankinden daha mor görünüyor. Yoksa simülasyonda mıyız?", mood: "👾 Kaotik" },
            { userName: "Yapay_Zeka_X", content: "Sıkılmayı önleyen yegane algoritma bulundu.", mood: "🚀 Vizyoner" }
        ];
        let mockWhispers = [
            { content: "Gece saat 4 ve ben hâlâ kod yazıyorum..." }
        ];
        let mockChats = [
            { userName: "Sistem", message: "Bağlantı kuruldu. İstediğini yazabilirsin." }
        ];
        let mockPolls = [
            { id: "p1", question: "Threads sence bitti mi?", option1: "Evet, çok sıkıcı", option2: "Hayır, hâlâ şansı var", votes1: 42, votes2: 12 }
        ];

        window.showToast = function(msg) {
            const container = document.getElementById("toast-container");
            const t = document.createElement("div");
            t.className = "p-3 bg-slate-900 border border-cyan-500/20 text-cyan-300 text-xs font-bold rounded-xl shadow-lg";
            t.textContent = msg;
            container.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        };

        window.guestLogin = function() {
            currentUser = {
                uid: "g_" + Date.now(),
                displayName: "AuraGezgini_" + Math.floor(Math.random() * 1000),
                mood: "👾 Kaotik"
            };
            document.getElementById("login-section").classList.add("hidden");
            document.getElementById("app-section").classList.remove("hidden");
            document.getElementById("user-display").classList.remove("hidden");
            document.getElementById("user-name-tag").textContent = currentUser.displayName;
            
            showToast("Ziyaretçi girişi başarıyla yapıldı!");
            renderAll();
        };

        window.logout = function() {
            currentUser = null;
            document.getElementById("login-section").classList.remove("hidden");
            document.getElementById("app-section").classList.add("hidden");
            document.getElementById("user-display").classList.add("hidden");
        };

        window.switchTab = function(tab) {
            ["feed", "whisper", "chat", "playground"].forEach(t => {
                document.getElementById(`view-${t}`).classList.add("hidden");
                document.getElementById(`btn-tab-${t}`).className = "w-full text-left px-4 py-3 rounded-xl text-xs font-bold text-slate-400 hover:bg-slate-900 transition";
            });
            document.getElementById(`view-${tab}`).classList.remove("hidden");
            document.getElementById(`btn-tab-${tab}`).className = "w-full text-left px-4 py-3 rounded-xl text-xs font-bold transition bg-gradient-to-r from-violet-600/10 to-fuchsia-600/10 text-violet-400 border border-violet-500/20";
        };

        // YENİ: KULLANICI / İÇERİK ARAMA SİSTEMİ
        window.searchUser = function() {
            const query = document.getElementById("search-user-input").value.toLowerCase().trim();
            const alertBox = document.getElementById("search-filter-alert");
            const statusText = document.getElementById("search-status-text");

            if (query === "") {
                alertBox.classList.add("hidden");
                statusText.classList.add("hidden");
                renderFeed();
                return;
            }

            alertBox.classList.remove("hidden");
            statusText.classList.remove("hidden");
            switchTab('feed'); // Arama yapıldığında otomatik akış tabına al

            const filteredPosts = mockPosts.filter(post => 
                post.userName.toLowerCase().includes(query) || 
                post.content.toLowerCase().includes(query)
            );

            renderFeed(filteredPosts);
        };

        window.clearSearchFilter = function() {
            document.getElementById("search-user-input").value = "";
            document.getElementById("search-filter-alert").classList.add("hidden");
            document.getElementById("search-status-text").classList.add("hidden");
            renderFeed();
        };

        const ideas = [
            "Gelecekte sadece tek bir kelime konuşma hakkın olsa bu kelime ne olurdu?",
            "Sosyal medyayı tamamen silsek insanlar ilk gün ne yapardı?",
            "Şu an yapmakta olduğun en çılgın hayalin nedir?"
        ];
        window.spinIdea = function() {
            const random = ideas[Math.floor(Math.random() * ideas.length)];
            document.getElementById("idea-box").textContent = random;
            document.getElementById("post-input").value = `🎯 FİKİR ÇARKI CEVABIM:\n"${random}"\n\nBence...`;
        };

        window.createPost = function() {
            const val = document.getElementById("post-input").value.trim();
            if(!val) return;
            mockPosts.unshift({ userName: currentUser.displayName, content: val, mood: currentUser.mood });
            document.getElementById("post-input").value = "";
            showToast("Gönderiniz yayında!");
            renderFeed();
        };

        function renderFeed(postsToRender = mockPosts) {
            const container = document.getElementById("feed-container");
            container.innerHTML = "";
            
            if(postsToRender.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-slate-500 text-xs">
                        Aradığınız kriterde hiçbir kozmik sinyal bulunamadı. 🌌
                    </div>
                `;
                return;
            }

            postsToRender.forEach(p => {
                const el = document.createElement("div");
                el.className = "glass-card rounded-2xl p-4 space-y-3";
                el.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-xs text-slate-200">${p.userName}</span>
                        <span class="text-[9px] bg-violet-500/10 text-violet-400 font-bold px-2 py-0.5 rounded">${p.mood || '👾 Kaotik'}</span>
                    </div>
                    <p class="text-xs text-slate-300 leading-relaxed break-words">${p.content}</p>
                `;
                container.appendChild(el);
            });
        }

        window.createWhisper = function() {
            const val = document.getElementById("whisper-input").value.trim();
            if(!val) return;
            mockWhispers.unshift({ content: val });
            document.getElementById("whisper-input").value = "";
            showToast("Yeraltına fısıldandı.");
            renderWhisper();
        };

        function renderWhisper() {
            const container = document.getElementById("whisper-container");
            container.innerHTML = "";
            mockWhispers.forEach(w => {
                const el = document.createElement("div");
                el.className = "bg-slate-950/40 border border-slate-850 p-4 rounded-xl";
                el.innerHTML = `<p class="text-xs text-pink-300 italic font-light">" ${w.content} "</p>`;
                container.appendChild(el);
            });
        }

        window.sendChat = function(e) {
            e.preventDefault();
            const input = document.getElementById("chat-input");
            const val = input.value.trim();
            if(!val) return;
            mockChats.push({ userName: currentUser.displayName, message: val });
            input.value = "";
            renderChat();
        };

        function renderChat() {
            const container = document.getElementById("chat-container");
            container.innerHTML = "";
            mockChats.forEach(c => {
                const isMe = c.userName === currentUser.displayName;
                const el = document.createElement("div");
                el.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
                el.innerHTML = `
                    <div class="max-w-[80%] p-2.5 rounded-xl text-xs ${isMe ? 'bg-cyan-600' : 'bg-slate-900 border border-slate-800'}">
                        <span class="font-bold text-[8px] block text-slate-400 mb-0.5">${c.userName}</span>
                        <p class="break-all font-medium">${c.message}</p>
                    </div>
                `;
                container.appendChild(el);
            });
            container.scrollTop = container.scrollHeight;
        }

        window.setCurrentColor = function(color) {
            selectedColor = color;
        };

        window.clearBoard = function() {
            pixelBoardState = Array(256).fill("#0f172a");
            buildPixelBoard();
        };

        function buildPixelBoard() {
            const board = document.getElementById("pixel-board-target");
            board.innerHTML = "";
            for (let i = 0; i < 256; i++) {
                const pixel = document.createElement("div");
                pixel.className = "w-full aspect-square border border-slate-900/40 cursor-pointer rounded-sm transition-colors duration-100";
                pixel.style.backgroundColor = pixelBoardState[i];
                pixel.addEventListener("click", () => {
                    pixelBoardState[i] = selectedColor;
                    pixel.style.backgroundColor = selectedColor;
                });
                board.appendChild(pixel);
            }
        }

        window.sharePixelArt = function() {
            let art = "🎨 Bir Pixel Şaheseri Tasarladım!\n\n";
            pixelBoardState.forEach((color, index) => {
                if (color === "#ef4444") art += "🔴";
                else if (color === "#22c55e") art += "🟢";
                else if (color === "#06b6d4") art += "🔵";
                else if (color === "#a855f7") art += "🟣";
                else if (color === "#ffffff") art += "⚪";
                else art += "⬛";
                if ((index + 1) % 16 === 0) art += "\n";
            });
            mockPosts.unshift({ userName: currentUser.displayName, content: art, mood: "🎨 Tasarımcı" });
            switchTab('feed');
            renderFeed();
            showToast("Sanatınız akışta paylaşıldı!");
        };

        window.addNewPoll = function() {
            const q = document.getElementById("new-poll-title").value.trim();
            const o1 = document.getElementById("new-poll-opt1").value.trim();
            const o2 = document.getElementById("new-poll-opt2").value.trim();
            if(!q || !o1 || !o2) return;

            mockPolls.unshift({ id: "p_" + Date.now(), question: q, option1: o1, option2: o2, votes1: 0, votes2: 0 });
            document.getElementById("new-poll-title").value = "";
            document.getElementById("new-poll-opt1").value = "";
            document.getElementById("new-poll-opt2").value = "";
            showToast("Yeni anket yayınlandı!");
            renderPolls();
        };

        window.votePollDynamic = function(id, option) {
            const poll = mockPolls.find(p => p.id === id);
            if(!poll) return;
            if(option === 1) poll.votes1++;
            else poll.votes2++;
            renderPolls();
            showToast("Oyunuz kaydedildi.");
        };

        function renderPolls() {
            const wrapper = document.getElementById("polls-list-wrapper");
            wrapper.innerHTML = "";
            mockPolls.forEach(poll => {
                const t1 = poll.votes1;
                const t2 = poll.votes2;
                const total = t1 + t2 || 1;
                const pct1 = Math.round((t1/total)*100);
                const pct2 = Math.round((t2/total)*100);

                const el = document.createElement("div");
                el.className = "bg-slate-950/60 p-3.5 rounded-xl border border-slate-900 space-y-2";
                el.innerHTML = `
                    <span class="text-[11px] font-bold text-slate-200 block">${poll.question}</span>
                    <div class="space-y-2 pt-1">
                        <button onclick="votePollDynamic('${poll.id}', 1)" class="w-full text-left relative overflow-hidden p-2 rounded-lg bg-slate-900 border border-slate-800 text-[10px] transition flex justify-between items-center z-10">
                            <div class="absolute top-0 left-0 bottom-0 bg-violet-600/15" style="width: ${pct1}%"></div>
                            <span class="relative z-20">${poll.option1}</span>
                            <span class="relative z-20 text-violet-400 font-bold">${pct1}% (${t1})</span>
                        </button>
                        <button onclick="votePollDynamic('${poll.id}', 2)" class="w-full text-left relative overflow-hidden p-2 rounded-lg bg-slate-900 border border-slate-800 text-[10px] transition flex justify-between items-center z-10">
                            <div class="absolute top-0 left-0 bottom-0 bg-cyan-600/15" style="width: ${pct2}%"></div>
                            <span class="relative z-20">${poll.option2}</span>
                            <span class="relative z-20 text-cyan-400 font-bold">${pct2}% (${t2})</span>
                        </button>
                    </div>
                `;
                wrapper.appendChild(el);
            });
        }

        function renderAll() {
            renderFeed();
            renderWhisper();
            renderChat();
            renderPolls();
            buildPixelBoard();
        }
    </script>
</body>
</html>
