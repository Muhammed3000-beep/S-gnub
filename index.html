<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gündem, Sohbet & Ünlüler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for beautiful look */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    
    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl relative pb-16">
        
        <header class="p-4 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-20">
            <h1 id="page-title" class="text-xl font-bold text-indigo-600">⚡ Gündem</h1>
            <div id="user-area"></div>
        </header>

        <div id="login-screen" class="flex-1 flex flex-col items-center justify-center p-6 space-y-4">
            <div class="text-6xl animate-bounce">🚀</div>
            <h2 class="text-2xl font-bold text-center text-slate-800">Dünyaya Bağlan!</h2>
            <p class="text-slate-500 text-center text-sm px-6">Gündemi yakala, toplulukla chatleş ve ünlü yapay zeka karakterleriyle birebir konuş.</p>
            <button id="btn-login" class="w-full max-w-xs py-3 px-6 bg-slate-900 text-white rounded-full font-semibold hover:bg-slate-800 transition shadow-lg">
                Google ile Giriş Yap
            </button>
        </div>

        <div id="app-screen" class="hidden flex-1 flex flex-col p-4 overflow-y-auto">
            
            <section id="tab-gundem" class="space-y-6">
                <div class="bg-slate-100 p-4 rounded-2xl">
                    <textarea id="input-gundem" placeholder="Gündeme dair ne paylaşmak istersin?" class="w-full bg-transparent border-none focus:outline-none resize-none text-slate-800 text-sm" rows="2"></textarea>
                    <div class="flex justify-end mt-2">
                        <button id="btn-paylas" class="px-5 py-1.5 bg-indigo-600 text-white rounded-full text-xs font-semibold hover:bg-indigo-700 transition">Paylaş</button>
                    </div>
                </div>
                <div class="space-y-4">
                    <h3 class="font-bold text-md text-slate-500">Canlı Akış</h3>
                    <div id="gundem-listesi" class="space-y-3"></div>
                </div>
            </section>

            <section id="tab-chat" class="hidden flex flex-col h-[70vh]">
                <div id="chat-messages" class="flex-1 overflow-y-auto space-y-3 pr-1 mb-4 flex flex-col">
                    </div>
                <div class="flex items-center space-x-2 bg-slate-100 p-2 rounded-full">
                    <input type="text" id="input-chat" placeholder="Bir mesaj yaz..." class="flex-1 bg-transparent border-none focus:outline-none px-3 text-sm text-slate-800" />
                    <button id="btn-send-chat" class="p-2 bg-indigo-600 text-white rounded-full hover:bg-indigo-700 transition">
                        ✈️
                    </button>
                </div>
            </section>

            <section id="tab-unluler" class="hidden flex flex-col h-[70vh]">
                <div class="flex space-x-2 overflow-x-auto pb-3 mb-2 border-b border-slate-100">
                    <button class="celebrity-btn active px-4 py-1.5 rounded-full text-xs font-semibold bg-indigo-100 text-indigo-700 border border-indigo-200" data-cel="elon">Elon Musk</button>
                    <button class="celebrity-btn px-4 py-1.5 rounded-full text-xs font-semibold bg-slate-100 text-slate-600 border border-transparent" data-cel="einstein">Einstein</button>
                    <button class="celebrity-btn px-4 py-1.5 rounded-full text-xs font-semibold bg-slate-100 text-slate-600 border border-transparent" data-cel="shakespeare">Shakespeare</button>
                </div>
                <div id="ai-messages" class="flex-1 overflow-y-auto space-y-3 pr-1 mb-4 flex flex-col">
                    <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-3 text-xs text-indigo-800 max-w-[80%]">
                        Merhaba! Ben Elon. Mars'a gitmek mi istiyorsun, yoksa X hakkında mı konuşalım? 🚀
                    </div>
                </div>
                <div class="flex items-center space-x-2 bg-slate-100 p-2 rounded-full">
                    <input type="text" id="input-ai" placeholder="Ünlüye sorunu sor..." class="flex-1 bg-transparent border-none focus:outline-none px-3 text-sm text-slate-800" />
                    <button id="btn-send-ai" class="p-2 bg-indigo-600 text-white rounded-full">
                        ⚡
                    </button>
                </div>
            </section>

        </div>

        <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-slate-100 flex justify-around items-center h-16 z-20">
            <button class="nav-item flex flex-col items-center space-y-1 text-indigo-600" data-tab="gundem">
                <span class="text-xl">⚡</span>
                <span class="text-[10px] font-bold">Gündem</span>
            </button>
            <button class="nav-item flex flex-col items-center space-y-1 text-slate-400 hover:text-indigo-600" data-tab="chat">
                <span class="text-xl">💬</span>
                <span class="text-[10px] font-bold">Sohbet</span>
            </button>
            <button class="nav-item flex flex-col items-center space-y-1 text-slate-400 hover:text-indigo-600" data-tab="unluler">
                <span class="text-xl">🎭</span>
                <span class="text-[10px] font-bold">Ünlüler</span>
            </button>
        </nav>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Yapılandırması
        const firebaseConfig = {
            apiKey: "AIzaSyBp-FSOxxPBtvyOCLDXMz5G8OsdEhjx5uk",
            authDomain: "signub-c831e.firebaseapp.com",
            projectId: "signub-c831e",
            storageBucket: "signub-c831e.firebasestorage.app",
            messagingSenderId: "1062016988286",
            appId: "1:1062016988286:web:ae1f4543fb1b751b16142f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // UI Elementleri
        const btnLogin = document.getElementById("btn-login");
        const btnPaylas = document.getElementById("btn-paylas");
        const inputGundem = document.getElementById("input-gundem");
        const gundemListesi = document.getElementById("gundem-listesi");
        const userArea = document.getElementById("user-area");
        const appScreen = document.getElementById("app-screen");
        const bottomNav = document.getElementById("bottom-nav");

        // Sekmeler Arası Geçiş Mekanizması
        const tabs = {
            gundem: { el: document.getElementById("tab-gundem"), title: "⚡ Gündem" },
            chat: { el: document.getElementById("tab-chat"), title: "💬 Ortak Sohbet" },
            unluler: { el: document.getElementById("tab-unluler"), title: "🎭 Ünlüler AI" }
        };

        document.querySelectorAll(".nav-item").forEach(button => {
            button.addEventListener("click", () => {
                const targetTab = button.getAttribute("data-tab");
                
                // Buton stillerini güncelle
                document.querySelectorAll(".nav-item").forEach(btn => {
                    btn.classList.replace("text-indigo-600", "text-slate-400");
                });
                button.classList.replace("text-slate-400", "text-indigo-600");

                // Sekmeleri gizle/göster
                Object.keys(tabs).forEach(key => {
                    if (key === targetTab) {
                        tabs[key].el.classList.remove("hidden");
                        document.getElementById("page-title").textContent = tabs[key].title;
                    } else {
                        tabs[key].el.classList.add("hidden");
                    }
                });
            });
        });

        // AUTH DURUMU VE KULLANICI KAYDI
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById("login-screen").classList.add("hidden");
                appScreen.classList.remove("hidden");
                bottomNav.classList.remove("hidden");
                
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    displayName: user.displayName,
                    email: user.email,
                    photoURL: user.photoURL,
                    lastLogin: serverTimestamp()
                }, { merge: true });

                userArea.innerHTML = `
                    <div class="flex items-center space-x-2">
                        <img src="${user.photoURL}" class="w-8 h-8 rounded-full border border-indigo-200" />
                        <button id="btn-logout" class="text-xs text-red-500 font-bold hover:underline">Çıkış</button>
                    </div>
                `;
                document.getElementById("btn-logout").addEventListener("click", () => signOut(auth));
                
                gundemiDinle();
                chatDinle();
            } else {
                document.getElementById("login-screen").classList.remove("hidden");
                appScreen.classList.add("hidden");
                bottomNav.classList.add("hidden");
                userArea.innerHTML = "";
            }
        });

        // Google ile Giriş
        btnLogin.addEventListener("click", () => {
            signInWithPopup(auth, provider).catch(err => console.error(err));
        });

        // GÜNDEM MODÜLÜ
        btnPaylas.addEventListener("click", async () => {
            const text = inputGundem.value.trim();
            if(!text) return;
            await addDoc(collection(db, "gundem"), {
                uid: auth.currentUser.uid,
                userName: auth.currentUser.displayName,
                userPhoto: auth.currentUser.photoURL,
                content: text,
                createdAt: serverTimestamp()
            });
            inputGundem.value = "";
        });

        function gundemiDinle() {
            const q = query(collection(db, "gundem"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                gundemListesi.innerHTML = "";
                snapshot.forEach(doc => {
                    const post = doc.data();
                    const el = document.createElement("div");
                    el.className = "p-4 bg-white rounded-2xl border border-slate-100 flex space-x-3 shadow-sm";
                    el.innerHTML = `
                        <img src="${post.userPhoto}" class="w-9 h-9 rounded-full" />
                        <div>
                            <h4 class="font-bold text-xs text-slate-700">${post.userName}</h4>
                            <p class="text-slate-600 text-sm mt-1">${post.content}</p>
                        </div>
                    `;
                    gundemListesi.appendChild(el);
                });
            });
        }

        // ORTAK CHAT MODÜLÜ
        const btnSendChat = document.getElementById("btn-send-chat");
        const inputChat = document.getElementById("input-chat");
        const chatMessages = document.getElementById("chat-messages");

        btnSendChat.addEventListener("click", async () => {
            const text = inputChat.value.trim();
            if(!text) return;
            await addDoc(collection(db, "chats"), {
                uid: auth.currentUser.uid,
                userName: auth.currentUser.displayName,
                userPhoto: auth.currentUser.photoURL,
                message: text,
                createdAt: serverTimestamp()
            });
            inputChat.value = "";
        });

        function chatDinle() {
            const q = query(collection(db, "chats"), orderBy("createdAt", "asc"), limit(50));
            onSnapshot(q, (snapshot) => {
                chatMessages.innerHTML = "";
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const isMe = msg.uid === auth.currentUser.uid;
                    const el = document.createElement("div");
                    el.className = `flex ${isMe ? 'justify-end' : 'justify-start'} w-full`;
                    el.innerHTML = `
                        <div class="flex items-end space-x-2 ${isMe ? 'flex-row-reverse space-x-reverse' : ''} max-w-[80%]">
                            <img src="${msg.userPhoto}" class="w-6 h-6 rounded-full" />
                            <div class="p-3 rounded-2xl text-xs ${isMe ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-800'}">
                                <p class="font-bold mb-0.5 text-[9px] opacity-75">${msg.userName}</p>
                                <p>${msg.message}</p>
                            </div>
                        </div>
                    `;
                    chatMessages.appendChild(el);
                });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        // ÜNLÜLER YAPAY ZEKA MODÜLÜ (SİMÜLASYON)
        let activeCeleb = "elon";
        const celebResponses = {
            elon: [
                "Mars için roketler hazır mı? 🚀",
                "X uygulamasında yeni bir güncelleme yapıyorum.",
                "Eğer her şey yolunda giderse 10 yıla kalmaz Mars'ta koloni kuracağız.",
                "Dostum, daha fazla yapay zeka ve elektrikli araba lazım."
            ],
            einstein: [
                "Hayal gücü, bilgiden daha önemlidir. 🧠",
                "Zaman görelidir evlat, kafanı böyle şeylerle yorma.",
                "Hatalar, yeni bir şeyler denediğini gösterir.",
                "Formül basit: E = mc²"
            ],
            shakespeare: [
                "Olmak ya da olmamak, işte bütün mesele bu! 🎭",
                "Gözlerin, karanlığı aydınlatan iki yıldız gibi.",
                "Kelimeler rüzgar gibidir, önemli olan hissettirdikleridir.",
                "Hayat, bir gölgeden ibarettir."
            ]
        };

        document.querySelectorAll(".celebrity-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".celebrity-btn").forEach(b => {
                    b.classList.replace("bg-indigo-100", "bg-slate-100");
                    b.classList.replace("text-indigo-700", "text-slate-600");
                });
                btn.classList.replace("bg-slate-100", "bg-indigo-100");
                btn.classList.replace("text-slate-600", "text-indigo-700");
                activeCeleb = btn.getAttribute("data-cel");
                
                // Karakter değiştiğinde karşılama mesajı
                document.getElementById("ai-messages").innerHTML = `
                    <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-3 text-xs text-indigo-800 max-w-[80%]">
                        Ben ${btn.textContent}! Bana istediğini sorabilirsin. ✨
                    </div>
                `;
            });
        });

        const btnSendAi = document.getElementById("btn-send-ai");
        const inputAi = document.getElementById("input-ai");
        const aiMessages = document.getElementById("ai-messages");

        btnSendAi.addEventListener("click", () => {
            const text = inputAi.value.trim();
            if(!text) return;

            // Kullanıcı mesajını ekle
            const userMsgEl = document.createElement("div");
            userMsgEl.className = "flex justify-end w-full";
            userMsgEl.innerHTML = `
                <div class="p-3 bg-slate-900 text-white rounded-2xl text-xs max-w-[80%]">
                    ${text}
                </div>
            `;
            aiMessages.appendChild(userMsgEl);
            inputAi.value = "";

            // Ünlü Yapay Zeka Cevabı Simüle et
            setTimeout(() => {
                const responses = celebResponses[activeCeleb];
                const randomReply = responses[Math.floor(Math.random() * responses.length)];
                
                const aiMsgEl = document.createElement("div");
                aiMsgEl.className = "flex justify-start w-full";
                aiMsgEl.innerHTML = `
                    <div class="p-3 bg-indigo-50 border border-indigo-100 text-indigo-800 rounded-2xl text-xs max-w-[80%]">
                        <strong class="block text-[9px] uppercase tracking-wider mb-1 opacity-70">${activeCeleb}</strong>
                        ${randomReply}
                    </div>
                `;
                aiMessages.appendChild(aiMsgEl);
                aiMessages.scrollTop = aiMessages.scrollHeight;
            }, 1000);
        });
    </script>
</body>
</html>
