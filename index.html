<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Light</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-4">
    <div class="max-w-md mx-auto bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl space-y-6">
        <h1 class="text-xl font-bold text-purple-400 text-center">⚡ AURA LIGHT</h1>
        
        <div id="login-area" class="space-y-3">
            <input type="text" id="username" placeholder="Kullanıcı Adınız" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-sm focus:outline-none">
            <button onclick="login()" class="w-full py-2 bg-purple-600 rounded-xl font-bold text-sm">Hızlı Başla</button>
        </div>

        <div id="app-area" class="hidden space-y-4">
            <div class="space-y-2">
                <textarea id="post-text" placeholder="Bir şeyler yaz..." class="w-full bg-slate-850 border border-slate-700 rounded-xl p-3 text-sm focus:outline-none" rows="2"></textarea>
                <button onclick="addPost()" class="w-full py-2 bg-pink-600 rounded-xl font-bold text-xs">Paylaş</button>
            </div>
            <div id="feed" class="space-y-3 pt-3 border-t border-slate-800"></div>
        </div>
    </div>

    <script>
        let user = null;
        let posts = [];

        function login() {
            const name = document.getElementById("username").value.trim();
            if(!name) return;
            user = name;
            document.getElementById("login-area").classList.add("hidden");
            document.getElementById("app-area").classList.remove("hidden");
            render();
        }

        function addPost() {
            const txt = document.getElementById("post-text").value.trim();
            if(!txt) return;
            posts.unshift({ user: user, content: txt });
            document.getElementById("post-text").value = "";
            render();
        }

        function render() {
            const f = document.getElementById("feed");
            f.innerHTML = "";
            posts.forEach(p => {
                const el = document.createElement("div");
                el.className = "p-3 bg-slate-800 rounded-xl border border-slate-700";
                el.innerHTML = `<span class="font-bold text-xs text-purple-400 block">${p.user}</span><p class="text-sm text-slate-300 mt-1">${p.content}</p>`;
                f.appendChild(el);
            });
        }
    </script>
</body>
</html>
