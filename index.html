<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gündem & Canlı Sohbet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #8b5cf6; border-radius: 10px; }
        .neon-glow {
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15), 0 0 40px rgba(236, 72, 153, 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen relative overflow-x-hidden">
    
    <div class="absolute top-[-10%] left-[-20%] w-[80%] h-[50%] bg-violet-600/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[10%] right-[-20%] w-[80%] h-[50%] bg-rose-500/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-slate-900/40 backdrop-blur-xl shadow-2xl relative pb-16 border-x border-slate-800/60">
        
        <header class="p-4 border-b border-slate-800/80 flex justify-between items-center bg-slate-950/80 sticky top-0 z-20 backdrop-blur-md">
            <h1 id="page-title" class="text-xl font-black bg-gradient-to-r from-violet-400 via-fuchsia-400 to-cyan-400 bg-clip-text text-transparent tracking-wide">✨ Sosyal Akış</h1>
            <div id="user-area"></div>
        </header>

        <div id="login-screen" class="flex-1 flex flex-col items-center justify-center p-6 space-y-8 relative z-10">
            <div class="relative">
                <div class="absolute inset-0 bg-violet-500 rounded-full blur-3xl opacity-30 animate-pulse"></div>
                <div class="text-8xl relative filter drop-shadow-[0_0_15px_rgba(139,92,246,0.5)]">🌌</div>
            </div>
            <div class="space-y-3 text-center">
                <h2 class="text-3xl font-black tracking-tight bg-gradient-to-r from-violet-400 via-fuchsia-400 to-cyan-400 bg-clip-text text-transparent">Şirket İçi Sosyal Ağ</h2>
                <p class="text-slate-400 text-sm px-6 leading-relaxed">Fikirlerini özgürce paylaş, ekibinle canlı ve güvenli şekilde hemen yazışmaya başla.</p>
            </div>
            <button id="btn-login" class="w-full max-w-xs py-4 px-6 bg-gradient-to-r from-violet-600 via-fuchsia-600 to-cyan-600 text-white rounded-2xl font-bold hover:opacity-90 transition-all transform hover:scale-[1.03] active:scale-[0.97] shadow-lg shadow-violet-500/30 flex items-center justify-center space-x-2">
                <span>Google ile Giriş Yap</span>
            </button>
        </div>

        <div id="app-screen" class="hidden flex-1 flex flex-col p-4 overflow-y-auto">
            
            <section id="tab-gundem" class="space-y-6">
                <div class="bg-white/5 p-4 rounded-3xl border border-slate-800/80 neon-glow">
                    <textarea id="input-gundem" placeholder="Bugün ekiple ne paylaşmak istersin? Fikirlerini yaz..." class="w-full bg-transparent border-none focus:outline-none resize-none text-slate-100 text-sm placeholder-slate-500 font-medium" rows="3"></textarea>
                    <div class="flex justify-end mt-2">
                        <button id="btn-paylas" class="px-6 py-2 bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white rounded-2xl text-xs font-bold hover:opacity-90 transition shadow-md shadow-violet-500/20">Paylaş</button>
                    </div>
                </div>
                <div class="space-y-4">
                    <h3 class="font-extrabold text-xs uppercase tracking-wider text-slate-500">Şirket Akışı</h3>
                    <div id="gundem-listesi" class="space-y-3"></div>
                </div>
            </section>

            <section id="tab-chat" class="hidden flex flex-col h-[70vh]">
                <div id="chat-messages" class="flex-1 overflow-y-auto space-y-3 pr-1 mb-4 flex flex-col"></div>
                <div class="flex items-center space-x-2 bg-white/5 p-2 rounded-2xl border border-slate-800/80 backdrop-blur-md">
                    <input type="text" id="input-chat" placeholder="Ekibe bir mesaj gönder..." class="flex-1 bg-transparent border-none focus:outline-none px-4 text-sm text-slate-100 placeholder-slate-500" />
                    <button id="btn-send-chat" class="p-3 bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white rounded-xl hover:opacity-90 transition shadow-md">
                        <svg class="w-4 h-4 transform rotate-45" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
            </section>

        </div>

        <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-950/90 border-t border-slate-900/80 flex justify-around items-center h-16 z-20 backdrop-blur-md">
            <button class="nav-item flex flex-col items-center space-y-1 text-violet-400 w-full py-2 transition" data-tab="gundem">
                <span class="text-xl filter drop-shadow-[0_0_8px_rgba(139,92,246,0.4)]">✨</span>
                <span class="text-[10px] font-bold">Sosyal Akış</span>
            </button>
            <button class="nav-item flex flex-col items-center space-y-1 text-slate-500 hover:text-violet-400 w-full py-2 transition" data-tab="chat">
                <span class="text-xl">💬</span>
                <span class="text-[10px] font-bold">Canlı Sohbet</span>
            </button>
        </nav>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBp-FSOxxPBtvyOCLDXMz5G8OsdEhjx5uk",
            authDomain: "signub-c831e.firebaseapp.com",
            projectId: "signub-c831e",
            storageBucket: "signub-c831e.firebasestorage.app",
            messagingSenderId: "1062016988286",
            appId: "1:1062016988286:web:ae1f4543fb1b751b16142f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const btnLogin = document.getElementById("btn-login");
        const btnPaylas = document.getElementById("btn-paylas");
        const inputGundem = document.getElementById("input-gundem");
        const gundemListesi = document.getElementById("gundem-listesi");
        const userArea = document.getElementById("user-area");
        const appScreen = document.getElementById("app-screen");
        const bottomNav = document.getElementById("bottom-nav");
        const btnSendChat = document.getElementById("btn-send-chat");
        const inputChat = document.getElementById("input-chat");
        const chatMessages = document.getElementById("chat-messages");

        // Sekme Değiştirme Sistemi
        const tabs = {
            gundem: { el: document.getElementById("tab-gundem"), title: "✨ Sosyal Akış" },
            chat: { el: document.getElementById("tab-chat"), title: "💬 Canlı Sohbet" }
        };

        document.querySelectorAll(".nav-item").forEach(button => {
            button.addEventListener("click", () => {
                const targetTab = button.getAttribute("data-tab");
                document.querySelectorAll(".nav-item").forEach(btn => btn.classList.replace("text-violet-400", "text-slate-500"));
                button.classList.replace("text-slate-500", "text-violet-400");

                Object.keys(tabs).forEach(key => {
                    if (key === targetTab) {
                        tabs[key].el.classList.remove("hidden");
                        document.getElementById("page-title").textContent = tabs[key].title;
                        if(key === 'chat') {
                            setTimeout(() => {
                                chatMessages.scrollTop = chatMessages.scrollHeight;
                            }, 50);
                        }
                    } else {
                        tabs[key].el.classList.add("hidden");
                    }
                });
            });
        });

        // KULLANICI GİRİŞ DURUMU
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById("login-screen").classList.add("hidden");
                appScreen.classList.remove("hidden");
                bottomNav.classList.remove("hidden");
                
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    displayName: user.displayName,
                    email: user.email,
                    photoURL: user.photoURL,
                    lastLogin: serverTimestamp()
                }, { merge: true });

                userArea.innerHTML = "";
                const userDiv = document.createElement("div");
                userDiv.className = "flex items-center space-x-2";
                
                const userImg = document.createElement("img");
                userImg.src = user.photoURL;
                userImg.className = "w-8 h-8 rounded-full border-2 border-violet-500 shadow-lg";
                
                const logoutBtn = document.createElement("button");
                logoutBtn.className = "text-xs text-rose-400 font-bold hover:underline";
                logoutBtn.textContent = "Çıkış";
                logoutBtn.addEventListener("click", () => signOut(auth));

                userDiv.appendChild(userImg);
                userDiv.appendChild(logoutBtn);
                userArea.appendChild(userDiv);
                
                gundemiDinle();
                chatDinle();
            } else {
                document.getElementById("login-screen").classList.remove("hidden");
                appScreen.classList.add("hidden");
                bottomNav.classList.add("hidden");
                userArea.innerHTML = "";
            }
        });

        btnLogin.addEventListener("click", () => {
            signInWithPopup(auth, provider).catch(err => console.error(err));
        });

        // 1. GENİŞLETİLMİŞ SOSYAL AKIŞ (GÜNDEM) SİSTEMİ
        btnPaylas.addEventListener("click", async () => {
            const text = inputGundem.value.trim();
            if(!text) return;
            try {
                await addDoc(collection(db, "gundem"), {
                    uid: auth.currentUser.uid,
                    userName: auth.currentUser.displayName,
                    userPhoto: auth.currentUser.photoURL,
                    content: text,
                    createdAt: serverTimestamp()
                });
                inputGundem.value = "";
            } catch (error) {
                console.error("Akış paylaşım hatası: ", error);
            }
        });

        function gundemiDinle() {
            const q = query(collection(db, "gundem"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                gundemListesi.innerHTML = "";
                snapshot.forEach(doc => {
                    const post = doc.data();
                    const el = document.createElement("div");
                    el.className = "p-4 bg-white/5 backdrop-blur-md rounded-2xl border border-slate-800/80 flex space-x-3 shadow-sm hover:border-slate-700/80 transition duration-300";
                    
                    const img = document.createElement("img");
                    img.src = post.userPhoto || 'https://via.placeholder.com/40';
                    img.className = "w-9 h-9 rounded-full border border-slate-700 shadow-sm";
                    
                    const textDiv = document.createElement("div");
                    textDiv.className = "flex-1";
                    
                    const nameH4 = document.createElement("h4");
                    nameH4.className = "font-extrabold text-xs text-slate-200";
                    nameH4.textContent = post.userName;
                    
                    const contentP = document.createElement("p");
                    contentP.className = "text-slate-300 text-sm mt-1 leading-relaxed font-medium break-all";
                    contentP.textContent = post.content;
                    
                    textDiv.appendChild(nameH4);
                    textDiv.appendChild(contentP);
                    el.appendChild(img);
                    el.appendChild(textDiv);
                    gundemListesi.appendChild(el);
                });
            });
        }

        // 2. HATALARI SIFIRLANMIŞ CANLI SOHBET SİSTEMİ
        async function sendMessage() {
            const text = inputChat.value.trim();
            if (!text || !auth.currentUser) return;
            
            try {
                await addDoc(collection(db, "chats"), {
                    uid: auth.currentUser.uid,
                    userName: auth.currentUser.displayName,
                    userPhoto: auth.currentUser.photoURL,
                    message: text,
                    createdAt: serverTimestamp()
                });
                inputChat.value = "";
            } catch (error) {
                console.error("Mesaj gönderilemedi: ", error);
            }
        }

        // Tıklama ve Enter dinleyicileri (Buton hatasını gideren kısım)
        btnSendChat.onclick = (e) => {
            e.preventDefault();
            sendMessage();
        };

        inputChat.onkeydown = (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                sendMessage();
            }
        };

        function chatDinle() {
            const q = query(collection(db, "chats"), orderBy("createdAt", "asc"), limit(80));
            onSnapshot(q, (snapshot) => {
                chatMessages.innerHTML = "";
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const isMe = msg.uid === auth.currentUser?.uid;
                    
                    const wrapper = document.createElement("div");
                    wrapper.className = `flex ${isMe ? 'justify-end' : 'justify-start'} w-full`;
                    
                    const container = document.createElement("div");
                    container.className = `flex items-end space-x-2 ${isMe ? 'flex-row-reverse space-x-reverse' : ''} max-w-[85%]`;
                    
                    const img = document.createElement("img");
                    img.src = msg.userPhoto || 'https://via.placeholder.com/30';
                    img.className = "w-7 h-7 rounded-full border border-slate-800 shadow-sm";
                    
                    const bubble = document.createElement("div");
                    bubble.className = `p-3.5 rounded-2xl text-sm shadow-lg ${isMe ? 'bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white rounded-br-none' : 'bg-white/5 border border-slate-800/80 text-slate-100 rounded-bl-none'}`;
                    
                    const authorSpan = document.createElement("span");
                    authorSpan.className = `block font-black text-[9px] uppercase tracking-wider opacity-80 mb-0.5 ${isMe ? 'text-violet-200' : 'text-fuchsia-400'}`;
                    authorSpan.textContent = msg.userName;
                    
                    const textP = document.createElement("p");
                    textP.className = "leading-snug font-medium break-all";
                    textP.textContent = msg.message;
                    
                    bubble.appendChild(authorSpan);
                    bubble.appendChild(textP);
                    container.appendChild(img);
                    container.appendChild(bubble);
                    wrapper.appendChild(container);
                    chatMessages.appendChild(wrapper);
                });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }
    </script>
</body>
</html>
