<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA ULTRA X - SOSYAL MEDYANIZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #03050a;
            overflow-x: hidden;
            user-select: none; 
            -webkit-user-select: none;
        }
        .glass-card {
            background: rgba(10, 15, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #03050a;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 99px;
        }
        input[type="file"] {
            display: none;
        }

        /* YENİ EKLENEN STİLLER */
        .mood-emojis {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }
        .mood-emojis button {
            background: #161b33;
            border: 1px solid #293054;
            font-size: 1.5rem;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .mood-emojis button:hover {
            background: #a855f7;
            transform: scale(1.1);
        }
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .tag {
            background: #161b33;
            color: #38bdf8;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid #293054;
        }
        .tag:hover {
            background: #38bdf8;
            color: #0d0f1a;
        }
        .btn-dice {
            background: #161b33;
            border: 1px solid #293054;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 10px;
            font-size: 11px;
            transition: 0.2s;
        }
        .btn-dice:hover {
            background: #2563eb;
        }
        .leader-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #161b33;
            align-items: center;
        }
        .leader-item:last-child {
            border-bottom: none;
        }
        .leader-item.gold {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid #a855f7;
            border-radius: 8px;
            font-weight: bold;
        }
        .leader-name {
            color: #e2e8f0;
            font-size: 12px;
        }
        .leader-score {
            color: #a855f7;
            font-weight: bold;
            font-size: 12px;
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col selection:bg-fuchsia-500/30">

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-2 pointer-events-none"></div>

    <header class="glass-card sticky top-0 z-40 border-b border-slate-800/80 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-violet-600 via-fuchsia-600 to-cyan-500 flex items-center justify-center font-black text-white shadow-lg animate-pulse">
                X
            </div>
            <div>
                <h1 class="text-lg font-extrabold tracking-tight bg-gradient-to-r from-violet-400 via-fuchsia-400 to-cyan-400 bg-clip-text text-transparent">AURA ULTRA X</h1>
                <span class="text-[9px] uppercase tracking-widest text-slate-500 font-bold block">SOSYAL AĞ ADRESİ</span>
            </div>
        </div>
        
        <div id="user-display" style="display: none;" class="items-center space-x-4">
            <div class="flex items-center space-x-3">
                <img id="user-avatar" src="" class="w-8 h-8 rounded-full border-2 border-cyan-500 shadow-md">
                <div class="flex flex-col">
                    <span id="user-name-tag" class="text-xs font-bold text-slate-200"></span>
                    <span class="text-[8px] text-emerald-400 font-semibold flex items-center">● Canlı Bağlantı</span>
                </div>
                <button onclick="logout()" class="text-xs text-rose-500 hover:text-rose-400 font-black transition pl-2">Çıkış</button>
            </div>
        </div>
    </header>

    <div class="flex-1 max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 p-4 lg:p-6">
        
        <aside class="lg:col-span-3 space-y-4">
            <div id="side-profile-card" style="display: none;" class="glass-card rounded-2xl p-4 border border-violet-500/10 text-center space-y-3">
                <div class="relative w-16 h-16 mx-auto">
                    <img id="side-user-avatar" src="https://i.pravatar.cc/100" class="w-full h-full rounded-full border-2 border-violet-500 shadow-md object-cover">
                </div>
                <div>
                    <h4 id="side-user-name" class="text-xs font-bold text-slate-200">Yükleniyor...</h4>
                    <p id="side-user-bio" class="text-[10px] text-slate-400 italic mt-1 bg-slate-950/40 p-2 rounded-lg border border-slate-900 break-words">Kozmik veri taranıyor...</p>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-4 space-y-2 border border-fuchsia-500/20">
                <h3 class="text-[10px] font-black text-fuchsia-400 uppercase tracking-widest">🔮 BUGÜNKÜ MODUN NE?</h3>
                <div class="mood-emojis">
                    <button onclick="selectMood('😎', 'Harika hissediyor!')">😎</button>
                    <button onclick="selectMood('😴', 'Uykusu var, kahve lazım...')">😴</button>
                    <button onclick="selectMood('📚', 'Harıl harıl ders çalışıyor!')">📚</button>
                    <button onclick="selectMood('🍕', 'Acıktı, yemek düşünüyor!')">🍕</button>
                    <button onclick="selectMood('🤯', 'Sınav haftası!')">🤯</button>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-4 space-y-3 border border-cyan-500/10">
                <h3 class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">🔍 İÇERİK FİLTRESİ</h3>
                <input type="text" id="search-input" oninput="searchNetwork()" placeholder="Akışta kelime ara..." class="w-full bg-slate-950 border border-slate-800 focus:border-cyan-500 rounded-xl px-3 py-2 text-xs text-slate-100 placeholder-slate-500 focus:outline-none transition">
                
                <div class="pt-2">
                    <span class="text-[9px] text-slate-400 font-bold block mb-1">🔥 TREND ETİKETLER</span>
                    <div class="tags-container">
                        <span class="tag" onclick="filterByTag('#YKS2026')">#YKS2026</span>
                        <span class="tag" onclick="filterByTag('#KahveMolası')">#KahveMolası</span>
                        <span class="tag" onclick="filterByTag('#Tatil')">#Tatil</span>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-4 space-y-2">
                <button onclick="switchTab('feed')" id="btn-tab-feed" class="w-full text-left px-4 py-3 rounded-xl text-xs font-bold transition flex items-center space-x-3 bg-gradient-to-r from-violet-600/10 to-fuchsia-600/10 text-violet-400 border border-violet-500/20">
                    <span>🪐</span> <span>Kozmik Akış (Feed)</span>
                </button>
            </div>
        </aside>

        <main class="lg:col-span-6 space-y-6">

            <div id="login-section" class="glass-card rounded-3xl p-8 text-center space-y-6 py-20 relative overflow-hidden">
                <h2 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-violet-400 via-fuchsia-400 to-cyan-400">Aura Giriş Protokolü</h2>
                <button onclick="googleLogin()" class="w-full py-3 bg-gradient-to-r from-violet-600 via-fuchsia-600 to-cyan-500 rounded-xl font-bold text-xs text-white shadow-lg hover:opacity-95 transition">Google ile Güvenli Bağlan 🚀</button>
            </div>

            <div id="app-section" style="display: none;" class="space-y-6">
                
                <div id="view-feed" class="space-y-6">
                    <div class="glass-card rounded-2xl p-4 space-y-3">
                        <textarea id="post-input" placeholder="Tüm sisteme bir fısıltı gönder..." class="w-full bg-slate-950 border border-slate-850 rounded-xl p-3 text-xs text-slate-100 focus:outline-none resize-none" rows="3"></textarea>
                        
                        <div class="flex justify-between items-center bg-slate-900/50 p-2 rounded-xl border border-slate-800">
                            <label class="cursor-pointer flex items-center space-x-2 text-cyan-400 hover:text-cyan-300 transition px-3 py-1.5 bg-cyan-950/40 rounded-lg border border-cyan-500/20">
                                <span class="text-[10px] font-bold">Fotoğraf Ekle</span>
                                <input type="file" id="post-image-upload" accept="image/*">
                            </label>
                            
                            <div class="flex items-center">
                                <button onclick="generateRandomWhisper()" class="btn-dice">🎲 Rastgele</button>
                                <button onclick="createPost()" class="px-5 py-2 bg-gradient-to-r from-violet-600 to-cyan-500 rounded-xl text-xs font-bold text-white shadow">Gönder 🚀</button>
                            </div>
                        </div>
                    </div>
                    
                    <div id="feed-container" class="space-y-4">
                        <div class="glass-card rounded-xl p-4 space-y-2 border border-slate-800">
                            <div class="flex justify-between items-center border-b border-slate-800/50 pb-2">
                                <span class="text-xs font-bold text-slate-200">Ahmet Yasin</span>
                                <div class="flex space-x-2">
                                    <button class="text-[9px] bg-slate-800 hover:bg-slate-700 text-slate-300 px-2 py-1 rounded">Arkadaş Ekle</button>
                                    <button onclick="voteUser('hedef_uid')" class="text-[9px] bg-emerald-900/50 hover:bg-emerald-800/50 text-emerald-400 border border-emerald-500/30 px-2 py-1 rounded font-bold">⚡ Oy Ver</button>
                                </div>
                            </div>
                            <p class="text-[11px] text-slate-300">Nasılsınız?</p>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <aside class="lg:col-span-3 space-y-6">
            
            <div id="leaderboard-section" style="display:none;" class="glass-card rounded-2xl p-4 space-y-3 border border-violet-500/20">
                <h3 class="text-[10px] font-black text-violet-400 uppercase tracking-widest">🏆 LİDERLİK TABLOSU</h3>
                <div id="leaderboard-list" class="space-y-2">
                    <div class="text-[10px] text-slate-400 text-center py-2">Veriler Yükleniyor...</div>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-4 space-y-4 border border-cyan-500/10">
                <h3 class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">📊 KÜRESEL ANKETLER</h3>
                <div class="space-y-4" id="polls-list-wrapper"></div>
            </div>
        </aside>

    </div>

    <audio id="local-audio" autoplay muted style="display:none;"></audio>
    <audio id="remote-audio" autoplay style="display:none;"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, orderBy, limit, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // KENDİ FİREBASE BİLGİLERİNİ GİREBİLİRSİN
        const firebaseConfig = {
            apiKey: "AIzaSyDXpYmC0IzpOpwGMkgswBDlo6h5aOlSUEU",
            authDomain: "auraultrax-4c3d4.firebaseapp.com",
            projectId: "auraultrax-4c3d4",
            storageBucket: "auraultrax-4c3d4.firebasestorage.app",
            messagingSenderId: "312586073635",
            appId: "1:312586073635:web:f59f4b2202eff46bfe2396"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        // BİLDİRİM FONKSİYONU
        window.showToast = function(message) {
            alert("⚡ " + message);
        };

        // GİRİŞ YAPMA
        window.googleLogin = function() {
            signInWithPopup(auth, provider).then(async (result) => {
                currentUser = result.user;
                document.getElementById("login-section").style.display = "none";
                document.getElementById("app-section").style.display = "block";
                document.getElementById("user-display").style.display = "flex";
                document.getElementById("side-profile-card").style.display = "block";
                document.getElementById("leaderboard-section").style.display = "block";
                
                document.getElementById("user-name-tag").textContent = currentUser.displayName;
                document.getElementById("side-user-name").textContent = currentUser.displayName;
                
                // Kullanıcıyı veritabanına kaydet/güncelle (oy sistemi için gerekli)
                const userRef = doc(db, "aura_users", currentUser.uid);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) {
                    await setDoc(userRef, { 
                        userName: currentUser.displayName, 
                        votes: 0 // Yeni kullanıcının oyu sıfır
                    });
                }

                listenLeaderboard(); // Giriş yapınca tabloyu dinlemeye başla
            }).catch((error) => {
                alert("Giriş Başarısız: " + error.message);
            });
        };

        // YENİ EKLENEN ÖZELLİKLERİN JS KODLARI

        // 1. Mod Seçimi (Sol Menü)
        window.selectMood = function(emoji, text) {
            const whisperInput = document.getElementById('post-input');
            if (whisperInput) {
                whisperInput.value = `Şu an ${emoji} ${text} #Modum`;
                window.showToast("Modun fısıltı kutusuna eklendi!");
            }
        };

        // 2. Trend Etiket Filtreleme
        window.filterByTag = function(tag) {
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.value = tag;
                window.showToast(tag + " etiketine göre filtreleniyor...");
                // searchNetwork(); // Mevcut arama fonksiyonunu tetikler
            }
        };

        // 3. Rastgele Zar (Fısıltı Üretici)
        const templates = [
            "Bugün kendime verdiğim en iyi söz: ______ ✨",
            "Sınava kalan süre daralırken ben: 📈",
            "Acilen birinin bana motivasyon vermesi lazım!",
            "Sisteme giren herkese selam olsun 🌌"
        ];
        window.generateRandomWhisper = function() {
            const whisperInput = document.getElementById('post-input');
            if (whisperInput) {
                const randomIndex = Math.floor(Math.random() * templates.length);
                whisperInput.value = templates[randomIndex];
            }
        };

        // 4. OY VERME SİSTEMİ (Liderlik Tablosu ve Akış için)
        window.voteUser = async function(targetUid) {
            if (!currentUser) return alert("Önce giriş yapmalısın!");
            if (currentUser.uid === targetUid) return alert("Kendinize oy veremezsiniz!");

            try {
                const userRef = doc(db, "aura_users", targetUid);
                await updateDoc(userRef, {
                    votes: increment(1)
                });
                window.showToast("Oy başarıyla gönderildi!");
            } catch (error) {
                console.error("Oy verme hatası:", error);
            }
        };

        // 5. LİDERLİK TABLOSUNU DİNLEME (İlk 3 Kişi)
        function listenLeaderboard() {
            const q = query(collection(db, "aura_users"), orderBy("votes", "desc"), limit(3));
            
            onSnapshot(q, (snapshot) => {
                const leaderboardList = document.getElementById("leaderboard-list");
                leaderboardList.innerHTML = ""; // Temizle
                
                let rank = 1;
                snapshot.forEach((docSnap) => {
                    const u = docSnap.data();
                    const uid = docSnap.id;
                    const isGold = rank === 1 ? "gold" : "";
                    const medal = rank === 1 ? "🥇" : (rank === 2 ? "🥈" : "🥉");
                    
                    leaderboardList.innerHTML += `
                        <div class="leader-item ${isGold}">
                            <div class="flex items-center space-x-2">
                                <span>${medal}</span>
                                <span class="leader-name">${u.userName || "Gizemli Kullanıcı"}</span>
                            </div>
                            <div class="flex items-center space-x-2">
                                <span class="leader-score">${u.votes || 0} oy</span>
                                <button onclick="voteUser('${uid}')" class="text-[9px] bg-violet-900/50 border border-violet-500 text-white px-1.5 py-0.5 rounded cursor-pointer hover:bg-violet-800 transition">Oy Ver</button>
                            </div>
                        </div>
                    `;
                    rank++;
                });

                if(snapshot.empty) {
                    leaderboardList.innerHTML = `<div class="text-[10px] text-slate-400 text-center">Henüz oy alan yok.</div>`;
                }
            });
        }

        // WebRTC ARAMA KISMI (Hata vermemesi için tamamlandı)
        window.startVoiceCall = async function(targetUid, targetName) {
            window.showToast(`${targetName} aranıyor...`);
            /*
                Burada veritabanına offer oluşturulup kaydedilecek.
                Mevcut kodun:
                await set(activeCallRef, {
                    callerId: currentUser.uid,
                    callerName: currentUser.displayName,
                    receiverId: targetUserUid,
                    offer: { type: offer.type, sdp: offer.sdp },
                    status: "ringing"
                });
            */
            console.log("Arama başlatıldı: " + targetUid);
        };

    </script>
</body>
</html>
