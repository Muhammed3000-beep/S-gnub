<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA ULTRA X - SOSYAL MEDYANIZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #03050a;
            overflow-x: hidden;
            user-select: none; 
            -webkit-user-select: none;
        }
        .glass-card {
            background: rgba(10, 15, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #03050a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 99px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col selection:bg-fuchsia-500/30 relative">
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-2 pointer-events-none"></div>

    <header class="glass-card sticky top-0 z-40 border-b border-slate-800/80 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-violet-600 via-fuchsia-600 to-cyan-500 flex items-center justify-center font-black text-white shadow-lg animate-pulse">
                X
            </div>
            <div>
                <h1 class="text-lg font-extrabold tracking-tight bg-gradient-to-r from-violet-400 via-fuchsia-400 to-cyan-400 bg-clip-text text-transparent">AURA ULTRA X</h1>
                <span class="text-[9px] uppercase tracking-widest text-slate-500 font-bold block">SOSYAL AĞ ADRESİ</span>
            </div>
        </div>
        
        <div id="user-display" style="display: none;" class="items-center space-x-4">
            <div class="flex items-center space-x-3">
                <img id="user-avatar" src="" class="w-8 h-8 rounded-full border-2 border-cyan-500 shadow-md">
                <div class="flex flex-col">
                    <span id="user-name-tag" class="text-xs font-bold text-slate-200"></span>
                    <span class="text-[8px] text-emerald-400 font-semibold flex items-center">● Canlı Bağlantı</span>
                </div>
                <button id="btn-logout" class="text-xs text-rose-500 hover:text-rose-400 font-black transition pl-2">Çıkış</button>
            </div>
        </div>
    </header>

    <div class="flex-1 max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 p-4 lg:p-6">
        
        <aside class="lg:col-span-3 space-y-4">
            <div class="glass-card rounded-2xl p-4 space-y-2">
                <button id="btn-tab-feed" class="w-full text-left px-4 py-3 rounded-xl text-xs font-bold transition flex items-center space-x-3 bg-gradient-to-r from-violet-600/10 to-fuchsia-600/10 text-violet-400 border border-violet-500/20">
                    <span>🪐</span> <span>Kozmik Akış (Keşfet)</span>
                </button>
                <button id="btn-tab-rooms" class="w-full text-left px-4 py-3 rounded-xl text-xs font-bold transition flex items-center space-x-3 text-slate-400 hover:bg-slate-900">
                    <span>🏠</span> <span>Özel Odalar</span>
                </button>
            </div>
        </aside>

        <main class="lg:col-span-6 space-y-6">
            <div id="login-section" class="glass-card rounded-3xl p-8 text-center space-y-6 py-20 relative overflow-hidden">
                <div class="absolute -top-20 -left-20 w-40 h-40 bg-violet-600/10 rounded-full blur-3xl"></div>
                <h2 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-violet-400 via-fuchsia-400 to-cyan-400">Aura Giriş Protokolü</h2>
                <div class="space-y-3 max-w-xs mx-auto pt-4">
                    <button id="btn-google-login" class="w-full py-3 bg-gradient-to-r from-violet-600 via-fuchsia-600 to-cyan-500 rounded-xl font-bold text-xs text-white shadow-lg hover:opacity-95 transition">Google ile Güvenli Bağlan 🚀</button>
                </div>
            </div>

            <div id="app-section" style="display: none;" class="space-y-6">
                
                <div id="view-feed" class="space-y-6">
                    <div class="glass-card rounded-2xl p-4 space-y-3">
                        <textarea id="post-input" placeholder="Tüm sisteme bir fısıltı gönder..." class="w-full bg-slate-950 border border-slate-850 rounded-xl p-3 text-xs text-slate-100 focus:outline-none resize-none" rows="3"></textarea>
                        <div class="flex justify-between items-center bg-slate-900/50 p-2 rounded-xl border border-slate-800">
                            <button id="btn-create-post" class="px-5 py-2 bg-gradient-to-r from-violet-600 to-cyan-500 rounded-xl text-xs font-bold text-white shadow ml-auto">Gönder 🚀</button>
                        </div>
                    </div>
                    <div id="feed-container" class="space-y-4">
                        </div>
                </div>

                <div id="view-rooms" style="display: none;" class="glass-card rounded-2xl flex flex-col h-[65vh] border border-slate-800/60 overflow-hidden relative">
                    
                    <div id="room-list-view" class="h-full flex flex-col">
                        <div class="p-4 bg-slate-950 border-b border-slate-800 flex flex-col space-y-3">
                            <span class="text-xs font-bold text-cyan-400">🏠 ÖZEL ODALAR</span>
                            <div class="flex space-x-2 items-center bg-slate-900 p-2 rounded-xl border border-slate-800">
                                <input type="text" id="new-room-name" placeholder="Oda Adı..." class="bg-transparent border-none px-2 py-1 text-xs text-white focus:outline-none flex-1">
                                <input type="password" id="new-room-pass" placeholder="Şifre (İsteğe Bağlı)" class="bg-slate-950 border border-slate-800 rounded-lg px-2 py-1 text-[10px] text-white focus:outline-none w-28">
                                <button id="btn-create-room" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-1.5 rounded-lg text-[10px] font-bold text-white transition">ODA EKLE</button>
                            </div>
                        </div>
                        <div id="rooms-container" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-950/20">
                            </div>
                    </div>

                    <div id="active-room-view" style="display:none;" class="h-full flex flex-col hidden">
                        <div class="p-3 bg-slate-950 border-b border-slate-800 flex justify-between items-center">
                            <span class="text-xs font-bold text-cyan-400" id="active-room-title">Oda Adı</span>
                            <button id="btn-exit-room" class="bg-rose-950/50 border border-rose-500/30 text-rose-400 px-3 py-1.5 rounded-lg text-[10px] font-bold transition">Odadan Çık 🚪</button>
                        </div>
                        <div id="room-chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-950/20 scroll-smooth">
                            </div>
                        <form id="room-chat-form" class="p-3 border-t border-slate-800 bg-slate-950/60 flex space-x-2">
                            <input type="text" id="room-chat-input" placeholder="Anlık mesaj yazın..." class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-xs text-slate-100 focus:outline-none">
                            <button type="submit" class="px-5 py-2.5 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl text-xs font-bold text-white">Gönder</button>
                        </form>
                    </div>
                </div>

            </div>
        </main>
        
        <aside class="lg:col-span-3 space-y-6"></aside>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDoc, doc, getDocs, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXpYmC0IzpOpwGMkgswBDlo6h5aOlSUEU",
            authDomain: "auraultrax-4c3d4.firebaseapp.com",
            projectId: "auraultrax-4c3d4",
            storageBucket: "auraultrax-4c3d4.firebasestorage.app",
            messagingSenderId: "312586073635",
            appId: "1:312586073635:web"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let currentRoomId = null;
        let roomChatUnsubscribe = null;

        // Bildirim Sistemi
        function showToast(message, type = "info") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = `p-3 rounded-xl text-xs font-bold border transition duration-300 shadow-xl ${
                type === "success" ? "bg-emerald-950/90 border-emerald-500/20 text-emerald-300" : "bg-rose-950/90 border-rose-500/20 text-rose-300"
            }`;
            toast.textContent = "⚡ " + message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        // Kimlik Doğrulama
        document.getElementById("btn-google-login").addEventListener("click", () => {
            signInWithPopup(auth, provider).catch(err => showToast("Giriş Hatası!", "error"));
        });

        document.getElementById("btn-logout").addEventListener("click", () => {
            signOut(auth).then(() => {
                document.getElementById("login-section").style.display = "block";
                document.getElementById("app-section").style.display = "none";
                document.getElementById("user-display").style.display = "none";
            });
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById("login-section").style.display = "none";
                document.getElementById("app-section").style.display = "block";
                document.getElementById("user-display").style.display = "flex";
                document.getElementById("user-avatar").src = user.photoURL || "https://i.pravatar.cc/100";
                document.getElementById("user-name-tag").textContent = user.displayName;
                
                loadFeed();
                listenRooms();
            }
        });

        // Sekme Değiştirme
        document.getElementById("btn-tab-feed").addEventListener("click", () => switchTab('feed'));
        document.getElementById("btn-tab-rooms").addEventListener("click", () => switchTab('rooms'));

        function switchTab(tab) {
            document.getElementById("view-feed").style.display = tab === 'feed' ? 'block' : 'none';
            document.getElementById("view-rooms").style.display = tab === 'rooms' ? 'flex' : 'none';
            
            document.getElementById("btn-tab-feed").className = tab === 'feed' ? "w-full text-left px-4 py-3 rounded-xl text-xs font-bold transition flex items-center space-x-3 bg-gradient-to-r from-violet-600/10 to-fuchsia-600/10 text-violet-400 border border-violet-500/20" : "w-full text-left px-4 py-3 rounded-xl text-xs font-bold transition flex items-center space-x-3 text-slate-400 hover:bg-slate-900";
            document.getElementById("btn-tab-rooms").className = tab === 'rooms' ? "w-full text-left px-4 py-3 rounded-xl text-xs font-bold transition flex items-center space-x-3 bg-gradient-to-r from-violet-600/10 to-fuchsia-600/10 text-violet-400 border border-violet-500/20" : "w-full text-left px-4 py-3 rounded-xl text-xs font-bold transition flex items-center space-x-3 text-slate-400 hover:bg-slate-900";
        }

        // KEŞFET (FEED) İŞLEMLERİ
        document.getElementById("btn-create-post").addEventListener("click", async () => {
            const input = document.getElementById("post-input");
            const text = input.value.trim();
            if(!text) return showToast("Boş gönderi paylaşılamaz!", "error");

            try {
                await addDoc(collection(db, "aura_posts"), {
                    text: text,
                    userId: currentUser.uid,
                    userName: currentUser.displayName,
                    userPhoto: currentUser.photoURL,
                    createdAt: serverTimestamp()
                });
                input.value = "";
                showToast("Gönderi başarıyla paylaşıldı!", "success");
            } catch(e) {
                showToast("Gönderi paylaşılamadı.", "error");
            }
        });

        function loadFeed() {
            const q = query(collection(db, "aura_posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById("feed-container");
                container.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const post = docSnap.data();
                    const div = document.createElement("div");
                    div.className = "glass-card rounded-2xl p-4 border border-slate-800/80";
                    div.innerHTML = `
                        <div class="flex items-center space-x-3 mb-2">
                            <img src="${post.userPhoto || 'https://i.pravatar.cc/100'}" class="w-8 h-8 rounded-full">
                            <span class="text-[13px] font-black text-cyan-400">${post.userName}</span>
                        </div>
                        <div class="text-[13px] text-slate-300 break-words">${post.text}</div>
                    `;
                    container.appendChild(div);
                });
            });
        }

        // ODA İŞLEMLERİ
        document.getElementById("btn-create-room").addEventListener("click", async () => {
            const nameInput = document.getElementById("new-room-name");
            const passInput = document.getElementById("new-room-pass");
            const name = nameInput.value.trim();
            const pass = passInput.value.trim();

            if(!name) return showToast("Oda adı gerekli!", "error");

            try {
                await addDoc(collection(db, "aura_rooms"), {
                    name: name,
                    password: pass,
                    adminId: currentUser.uid,
                    createdAt: serverTimestamp()
                });
                nameInput.value = "";
                passInput.value = "";
                showToast("Oda oluşturuldu!", "success");
            } catch(e) {
                showToast("Oda kurulamadı.", "error");
            }
        });

        function listenRooms() {
            const q = query(collection(db, "aura_rooms"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById("rooms-container");
                container.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const room = docSnap.data();
                    const roomId = docSnap.id;
                    const hasPassword = room.password && room.password.length > 0;
                    
                    const div = document.createElement("div");
                    div.className = "flex justify-between items-center p-3 glass-card border border-slate-800 rounded-xl";
                    
                    const roomInfo = document.createElement("div");
                    roomInfo.innerHTML = `<span class="text-xs font-bold text-slate-200">${room.name} ${hasPassword ? '🔒' : ''}</span>`;
                    
                    const joinBtn = document.createElement("button");
                    joinBtn.className = "bg-cyan-600 px-4 py-1.5 rounded-lg text-[10px] font-bold text-white";
                    joinBtn.textContent = "GİR";
                    joinBtn.onclick = () => attemptJoinRoom(roomId, room.name, room.password, room.adminId);

                    div.appendChild(roomInfo);
                    div.appendChild(joinBtn);
                    container.appendChild(div);
                });
            });
        }

        async function attemptJoinRoom(roomId, roomName, roomPass, adminId) {
            if (roomPass && currentUser.uid !== adminId) {
                const enteredPass = prompt(`🔒 ${roomName} odası için şifre girin:`);
                if (enteredPass !== roomPass) {
                    return showToast("Yanlış şifre!", "error");
                }
            }
            
            currentRoomId = roomId;
            document.getElementById("room-list-view").style.display = "none";
            document.getElementById("active-room-view").style.display = "flex";
            document.getElementById("active-room-title").textContent = roomName;
            
            startChatListener(roomId);
        }

        document.getElementById("btn-exit-room").addEventListener("click", () => {
            if(roomChatUnsubscribe) roomChatUnsubscribe();
            currentRoomId = null;
            document.getElementById("active-room-view").style.display = "none";
            document.getElementById("room-list-view").style.display = "flex";
        });

        function startChatListener(roomId) {
            const q = query(collection(db, "aura_rooms", roomId, "messages"), orderBy("createdAt", "asc"));
            roomChatUnsubscribe = onSnapshot(q, (snapshot) => {
                const container = document.getElementById("room-chat-container");
                container.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const msg = docSnap.data();
                    const isMe = msg.userId === currentUser.uid;
                    const div = document.createElement("div");
                    div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
                    div.innerHTML = `
                        <span class="text-[9px] text-slate-500 mb-1 px-1">${msg.userName}</span>
                        <div class="px-4 py-2 rounded-2xl text-[13px] ${isMe ? 'bg-cyan-600 text-white rounded-br-sm' : 'bg-slate-800 text-slate-200 rounded-bl-sm'}">
                            ${msg.text}
                        </div>
                    `;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        document.getElementById("room-chat-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const input = document.getElementById("room-chat-input");
            const text = input.value.trim();
            if(!text || !currentRoomId) return;
            
            input.value = "";
            try {
                await addDoc(collection(db, "aura_rooms", currentRoomId, "messages"), {
                    userId: currentUser.uid,
                    userName: currentUser.displayName,
                    text: text,
                    createdAt: serverTimestamp()
                });
            } catch(err) {
                showToast("Mesaj gönderilemedi!", "error");
            }
        });

    </script>
</body>
</html>
